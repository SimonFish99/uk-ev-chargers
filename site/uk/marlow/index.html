<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marlow EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Marlow EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Globe Park Marlow 1</strong><br>
Regus Marlow  Globe Park
</li>

<li>
<strong>45-48 Foxes Piece</strong><br>
45 - 48 Foxes Piece
</li>

<li>
<strong>Court Garden Car Park</strong><br>
Pound Lane
</li>

<li>
<strong>61 Station Road</strong><br>
61 Station Road
</li>

<li>
<strong>3 Oxford Road</strong><br>
3 Oxford Road
</li>

<li>
<strong>1 Station Rise</strong><br>
1 Station Rise
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.573581,
-0.761387
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.573581,
-0.761387
]).addTo(map)
.bindPopup("<b>Globe Park Marlow 1</b><br>Regus Marlow  Globe Park");



L.marker([
51.5751601,
-0.771447
]).addTo(map)
.bindPopup("<b>45-48 Foxes Piece</b><br>45 - 48 Foxes Piece");



L.marker([
51.5687728572621,
-0.777131316358805
]).addTo(map)
.bindPopup("<b>Court Garden Car Park</b><br>Pound Lane");



L.marker([
51.570972,
-0.770386
]).addTo(map)
.bindPopup("<b>61 Station Road</b><br>61 Station Road");



L.marker([
51.570921,
-0.778976
]).addTo(map)
.bindPopup("<b>3 Oxford Road</b><br>3 Oxford Road");



L.marker([
51.570894,
-0.771603
]).addTo(map)
.bindPopup("<b>1 Station Rise</b><br>1 Station Rise");



</script>

</body>
</html>
