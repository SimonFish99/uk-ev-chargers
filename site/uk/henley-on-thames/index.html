<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Henley-on-Thames EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Henley-on-Thames EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>HoT Mill Meadows Car Park 1</strong><br>
Meadow Road
</li>

<li>
<strong>Kings Road Car Park</strong><br>
Kings Road
</li>

<li>
<strong>Greys Road Car Park</strong><br>
Greys Road
</li>

<li>
<strong>Mill Meadows Car Park</strong><br>
Meadow Road
</li>

<li>
<strong>HiQ & Castrol Henley</strong><br>
Fairview Estate
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.53369,
-0.89851
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.53369,
-0.89851
]).addTo(map)
.bindPopup("<b>HoT Mill Meadows Car Park 1</b><br>Meadow Road");



L.marker([
51.539523,
-0.905884
]).addTo(map)
.bindPopup("<b>Kings Road Car Park</b><br>Kings Road");



L.marker([
51.53653503899187,
-0.9054503398690485
]).addTo(map)
.bindPopup("<b>Greys Road Car Park</b><br>Greys Road");



L.marker([
51.53064428162668,
-0.895433430487401
]).addTo(map)
.bindPopup("<b>Mill Meadows Car Park</b><br>Meadow Road");



L.marker([
51.5296089116339,
-0.896681989635908
]).addTo(map)
.bindPopup("<b>HiQ & Castrol Henley</b><br>Fairview Estate");



</script>

</body>
</html>
