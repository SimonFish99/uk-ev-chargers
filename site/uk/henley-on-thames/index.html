<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Henley-on-Thames EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Henley-on-Thames EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>HoT Mill Meadows Car Park 1</strong><br>
Meadow Road
</li>

<li>
<strong>Kings Road Car Park</strong><br>
Kings Road
</li>

<li>
<strong>Greys Road Car Park</strong><br>
Greys Road
</li>

<li>
<strong>Mill Meadows Car Park</strong><br>
Meadow Road
</li>

<li>
<strong>HiQ & Castrol Henley</strong><br>
Fairview Estate
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
51.53369,
-0.89851
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
51.53369,
-0.89851
]);

marker.bindPopup(`
<b>HoT Mill Meadows Car Park 1</b><br>
Meadow Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.53369,-0.89851" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.539523,
-0.905884
]);

marker.bindPopup(`
<b>Kings Road Car Park</b><br>
Kings Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.539523,-0.905884" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.53653503899187,
-0.9054503398690485
]);

marker.bindPopup(`
<b>Greys Road Car Park</b><br>
Greys Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.53653503899187,-0.9054503398690485" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.53064428162668,
-0.895433430487401
]);

marker.bindPopup(`
<b>Mill Meadows Car Park</b><br>
Meadow Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.53064428162668,-0.895433430487401" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.5296089116339,
-0.896681989635908
]);

marker.bindPopup(`
<b>HiQ & Castrol Henley</b><br>
Fairview Estate<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.5296089116339,-0.896681989635908" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
