<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kidderminster EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Kidderminster EV Chargers</h1>

<div id="map"></div>

<ul>

</li>

<li>

DY10 1AA
</li>

<li>

</li>

<li>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
52.384356,
-2.238571
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
52.384356,
-2.238571
]).addTo(map)
.bindPopup("<b>Saba UK-Kidderminster Station</b><br>Kidderminster Station");

52.387684,

-2.250444
]).addTo(map)

L.marker([
52.3689006280727,
-2.26125390829404
]).addTo(map)
.bindPopup("<b>Costa Drive-Through</b><br>Silverwoods Way");



L.marker([
52.377602,
-2.251614
]).addTo(map)
.bindPopup("<b>4000991</b><br>Whitehouse Road");



</script>

</html>
