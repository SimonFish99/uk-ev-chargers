<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wigston EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Wigston EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Wigston Pool Fitness Centre 1</strong><br>
Wigston Pool Fitness Centre 1
</li>

<li>
<strong>Countesthorpe Car Park 10</strong><br>
Countesthorpe Road
</li>

<li>
<strong>Station Road</strong><br>
Station Road
</li>

<li>
<strong>Aylestone Lane Car Park 1</strong><br>
Aylestone Lane Car Park
</li>

<li>
<strong>Station Road</strong><br>
Station Road
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
52.581523,
-1.121434
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
52.581523,
-1.121434
]);

marker.bindPopup(`
<b>Wigston Pool Fitness Centre 1</b><br>
Wigston Pool Fitness Centre 1<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.581523,-1.121434" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.57811,
-1.13545
]);

marker.bindPopup(`
<b>Countesthorpe Car Park 10</b><br>
Countesthorpe Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.57811,-1.13545" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.8161,
-1.2116
]);

marker.bindPopup(`
<b>Station Road</b><br>
Station Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.8161,-1.2116" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.58661,
-1.10809
]);

marker.bindPopup(`
<b>Aylestone Lane Car Park 1</b><br>
Aylestone Lane Car Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.58661,-1.10809" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.58161,
-1.2116
]);

marker.bindPopup(`
<b>Station Road</b><br>
Station Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.58161,-1.2116" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
