<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Southend-on-Sea EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Southend-on-Sea EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Shell Fossetts Way</strong><br>
Fossetts Way
</li>

<li>
<strong>Warrior Square Car Park</strong><br>
off Chichester Road
</li>

<li>
<strong>Alexandra Street 3</strong><br>
Alexandra Street Car Park
</li>

<li>
<strong>Alexandra Street 1</strong><br>
Alexandra Street Car Park
</li>

<li>
<strong>Tesco Extra-Southend</strong><br>
Prince Avenue
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.5563860252675,
0.7262628223772936
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.5563860252675,
0.7262628223772936
]).addTo(map)
.bindPopup("<b>Shell Fossetts Way</b><br>Fossetts Way");



L.marker([
51.538571,
0.714268
]).addTo(map)
.bindPopup("<b>Warrior Square Car Park</b><br>off Chichester Road");



L.marker([
51.535038,
0.712574
]).addTo(map)
.bindPopup("<b>Alexandra Street 3</b><br>Alexandra Street Car Park");



L.marker([
51.534951,
0.712596
]).addTo(map)
.bindPopup("<b>Alexandra Street 1</b><br>Alexandra Street Car Park");



L.marker([
51.56043,
0.683779
]).addTo(map)
.bindPopup("<b>Tesco Extra-Southend</b><br>Prince Avenue");



</script>

</body>
</html>
