<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Southend-on-Sea EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Southend-on-Sea EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Shell Fossetts Way</strong><br>
Fossetts Way
</li>

<li>
<strong>Warrior Square Car Park</strong><br>
off Chichester Road
</li>

<li>
<strong>Alexandra Street 3</strong><br>
Alexandra Street Car Park
</li>

<li>
<strong>Alexandra Street 1</strong><br>
Alexandra Street Car Park
</li>

<li>
<strong>Tesco Extra-Southend</strong><br>
Prince Avenue
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
51.5563860252675,
0.7262628223772936
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
51.5563860252675,
0.7262628223772936
]);

marker.bindPopup(`
<b>Shell Fossetts Way</b><br>
Fossetts Way<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.5563860252675,0.7262628223772936" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.538571,
0.714268
]);

marker.bindPopup(`
<b>Warrior Square Car Park</b><br>
off Chichester Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.538571,0.714268" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.535038,
0.712574
]);

marker.bindPopup(`
<b>Alexandra Street 3</b><br>
Alexandra Street Car Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.535038,0.712574" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.534951,
0.712596
]);

marker.bindPopup(`
<b>Alexandra Street 1</b><br>
Alexandra Street Car Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.534951,0.712596" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.56043,
0.683779
]);

marker.bindPopup(`
<b>Tesco Extra-Southend</b><br>
Prince Avenue<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.56043,0.683779" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
