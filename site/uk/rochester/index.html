<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rochester EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Rochester EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Tap Zap Go - Medway City Estate</strong><br>
Whitewall Centre, Whitewall Road
</li>

<li>
<strong>Morrisons Strood</strong><br>
Wm Morrisons PLC
</li>

<li>
<strong>McDonald's Terance Butler Avenue</strong><br>
Terance Butler Avenue
</li>

<li>
<strong>Commercial Road 1</strong><br>
Commercial Rd
</li>

<li>
<strong>Cory's Road 1</strong><br>
Cory's Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.39872166283743,
0.5104633474360298
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.39872166283743,
0.5104633474360298
]).addTo(map)
.bindPopup("<b>Tap Zap Go - Medway City Estate</b><br>Whitewall Centre, Whitewall Road");



L.marker([
51.39211,
0.491478
]).addTo(map)
.bindPopup("<b>Morrisons Strood</b><br>Wm Morrisons PLC");



L.marker([
51.4003529,
0.5152004
]).addTo(map)
.bindPopup("<b>McDonald's Terance Butler Avenue</b><br>Terance Butler Avenue");



L.marker([
51.395,
0.494028
]).addTo(map)
.bindPopup("<b>Commercial Road 1</b><br>Commercial Rd");



L.marker([
51.390601,
0.506367
]).addTo(map)
.bindPopup("<b>Cory's Road 1</b><br>Cory's Road");



</script>

</body>
</html>
