<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bletchley EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Bletchley EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Saba UK-Bletchley Station</strong><br>
Bletchley Station
</li>

<li>
<strong>Westminster Drive 1</strong><br>
Westminster Drive 1
</li>

<li>
<strong>Tees Way 1</strong><br>
Tees Way 1
</li>

<li>
<strong>Kennet Drive 2</strong><br>
Kennet Drive 2
</li>

<li>
<strong>Lancaster Gate 1</strong><br>
Lancaster Gate 1
</li>

<li>
<strong>Tesco Extra Milton Keynes Bletchley</strong><br>
 Watling Street
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.9955856,
-0.7372719
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.9955856,
-0.7372719
]).addTo(map)
.bindPopup("<b>Saba UK-Bletchley Station</b><br>Bletchley Station");



L.marker([
52.001207,
-0.749183
]).addTo(map)
.bindPopup("<b>Westminster Drive 1</b><br>Westminster Drive 1");



L.marker([
51.99937,
-0.763406
]).addTo(map)
.bindPopup("<b>Tees Way 1</b><br>Tees Way 1");



L.marker([
51.997231,
-0.756844
]).addTo(map)
.bindPopup("<b>Kennet Drive 2</b><br>Kennet Drive 2");



L.marker([
51.992332,
-0.759126
]).addTo(map)
.bindPopup("<b>Lancaster Gate 1</b><br>Lancaster Gate 1");



L.marker([
52.001045394704,
-0.725688951220718
]).addTo(map)
.bindPopup("<b>Tesco Extra Milton Keynes Bletchley</b><br> Watling Street");



</script>

</body>
</html>
