<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Royston EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Royston EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Aldi-Barnsley</strong><br>
High Street
</li>

<li>
<strong>SM Recreation Ground 1478</strong><br>
Steeple Morden
</li>

<li>
<strong>Royston Civic Centre</strong><br>
King James Way
</li>

<li>
<strong>McDonald's Royston</strong><br>
A505 Baldock Road
</li>

<li>
<strong>Tesco Extra - Royston</strong><br>
Old North Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
53.597971,
-1.458546
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
53.597971,
-1.458546
]).addTo(map)
.bindPopup("<b>Aldi-Barnsley</b><br>High Street");



L.marker([
52.067688,
-0.127127
]).addTo(map)
.bindPopup("<b>SM Recreation Ground 1478</b><br>Steeple Morden");



L.marker([
52.048,
-0.019
]).addTo(map)
.bindPopup("<b>Royston Civic Centre</b><br>King James Way");



L.marker([
52.0454769,
-0.0545891
]).addTo(map)
.bindPopup("<b>McDonald's Royston</b><br>A505 Baldock Road");



L.marker([
52.05935,
-0.031862
]).addTo(map)
.bindPopup("<b>Tesco Extra - Royston</b><br>Old North Road");



</script>

</body>
</html>
