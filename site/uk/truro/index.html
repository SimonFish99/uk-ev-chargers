<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Truro EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Truro EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Tesco Superstore - Truro</strong><br>
Garras Wharf
</li>

<li>
<strong>Trevissome Park</strong><br>
Trevissome Park
</li>

<li>
<strong>Truro East Park & Ride</strong><br>
Newquay Road
</li>

<li>
<strong>Truro West Park & Ride</strong><br>
Langarth Park
</li>

<li>
<strong>County Arms Highertown Truro</strong><br>
Highertown
</li>

<li>
<strong>Trevissome Park</strong><br>
Blackwater
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
50.260481,
-5.046785
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
50.260481,
-5.046785
]).addTo(map)
.bindPopup("<b>Tesco Superstore - Truro</b><br>Garras Wharf");



L.marker([
50.288124,
-5.15113
]).addTo(map)
.bindPopup("<b>Trevissome Park</b><br>Trevissome Park");



L.marker([
50.273216,
-5.032634
]).addTo(map)
.bindPopup("<b>Truro East Park & Ride</b><br>Newquay Road");



L.marker([
50.26582,
-5.11915
]).addTo(map)
.bindPopup("<b>Truro West Park & Ride</b><br>Langarth Park");



L.marker([
50.261294,
-5.073738
]).addTo(map)
.bindPopup("<b>County Arms Highertown Truro</b><br>Highertown");



L.marker([
50.286641,
-5.153925
]).addTo(map)
.bindPopup("<b>Trevissome Park</b><br>Blackwater");



</script>

</body>
</html>
