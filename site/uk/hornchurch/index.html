<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hornchurch EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Hornchurch EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Tesco Extra-Romford</strong><br>
300 Hornchurch Road
</li>

<li>
<strong>Tesco Superstore - Hornchurch</strong><br>
Airfield Way
</li>

<li>
<strong>Harrow Lodge Leisure Centre</strong><br>
Hornchurch Road
</li>

<li>
<strong>Lidl-Hornchurch</strong><br>
31 High Street
</li>

<li>
<strong>BP Hornchurch</strong><br>
Southend Arterial Road
</li>

<li>
<strong>Tesco</strong><br>
Airfield Way
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.565975,
0.190999
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.565975,
0.190999
]).addTo(map)
.bindPopup("<b>Tesco Extra-Romford</b><br>300 Hornchurch Road");



L.marker([
51.543816,
0.208896
]).addTo(map)
.bindPopup("<b>Tesco Superstore - Hornchurch</b><br>Airfield Way");



L.marker([
51.5609757,
0.2079193
]).addTo(map)
.bindPopup("<b>Harrow Lodge Leisure Centre</b><br>Hornchurch Road");



L.marker([
51.563479,
0.215635
]).addTo(map)
.bindPopup("<b>Lidl-Hornchurch</b><br>31 High Street");



L.marker([
51.5799752977876,
0.240292616941133
]).addTo(map)
.bindPopup("<b>BP Hornchurch</b><br>Southend Arterial Road");



L.marker([
51.5439829078738,
0.208136002775973
]).addTo(map)
.bindPopup("<b>Tesco</b><br>Airfield Way");



</script>

</body>
</html>
