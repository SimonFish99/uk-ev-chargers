<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Battersea EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Battersea EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Wycliffe Road</strong><br>
Wycliffe Road
</li>

<li>
<strong>Lavender Road</strong><br>
Lavender Road
</li>

<li>
<strong>Bolingbroke Grove</strong><br>
Bolingbroke Grove
</li>

<li>
<strong>Lurline Gardens</strong><br>
Lurline Gardens
</li>

<li>
<strong>Bullen Street</strong><br>
Bullen Street
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
51.470234,
-0.153256
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
51.470234,
-0.153256
]);

marker.bindPopup(`
<b>Wycliffe Road</b><br>
Wycliffe Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.470234,-0.153256" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.46729,
-0.175666
]);

marker.bindPopup(`
<b>Lavender Road</b><br>
Lavender Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.46729,-0.175666" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.459114,
-0.170898
]);

marker.bindPopup(`
<b>Bolingbroke Grove</b><br>
Bolingbroke Grove<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.459114,-0.170898" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.47719,
-0.14862
]);

marker.bindPopup(`
<b>Lurline Gardens</b><br>
Lurline Gardens<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.47719,-0.14862" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.472654,
-0.169448
]);

marker.bindPopup(`
<b>Bullen Street</b><br>
Bullen Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.472654,-0.169448" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
