<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Battersea EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Battersea EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Wycliffe Road</strong><br>
Wycliffe Road
</li>

<li>
<strong>Lavender Road</strong><br>
Lavender Road
</li>

<li>
<strong>Bolingbroke Grove</strong><br>
Bolingbroke Grove
</li>

<li>
<strong>Lurline Gardens</strong><br>
Lurline Gardens
</li>

<li>
<strong>Bullen Street</strong><br>
Bullen Street
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.470234,
-0.153256
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.470234,
-0.153256
]).addTo(map)
.bindPopup(`
<b>Wycliffe Road</b><br>
Wycliffe Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.470234,-0.153256" target="_blank">
Get directions
</a>
`);



L.marker([
51.46729,
-0.175666
]).addTo(map)
.bindPopup(`
<b>Lavender Road</b><br>
Lavender Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.46729,-0.175666" target="_blank">
Get directions
</a>
`);



L.marker([
51.459114,
-0.170898
]).addTo(map)
.bindPopup(`
<b>Bolingbroke Grove</b><br>
Bolingbroke Grove<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.459114,-0.170898" target="_blank">
Get directions
</a>
`);



L.marker([
51.47719,
-0.14862
]).addTo(map)
.bindPopup(`
<b>Lurline Gardens</b><br>
Lurline Gardens<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.47719,-0.14862" target="_blank">
Get directions
</a>
`);



L.marker([
51.472654,
-0.169448
]).addTo(map)
.bindPopup(`
<b>Bullen Street</b><br>
Bullen Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.472654,-0.169448" target="_blank">
Get directions
</a>
`);



</script>

</body>
</html>
