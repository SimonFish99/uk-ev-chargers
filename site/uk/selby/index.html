<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Selby EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Selby EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>JET Abbeyside Filling Station</strong><br>
1 Bawtry Road Abbeyside
</li>

<li>
<strong>The Wishing Well</strong><br>
Oakney Wood Drive
</li>

<li>
<strong>Selby 6881-2</strong><br>
York Street
</li>

<li>
<strong>Lidl Selby</strong><br>
Bawtry Road
</li>

<li>
<strong>Morrisons Selby</strong><br>
Market Cross
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
53.774371872504986,
-1.0644195540277224
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
53.774371872504986,
-1.0644195540277224
]);

marker.bindPopup(`
<b>JET Abbeyside Filling Station</b><br>
1 Bawtry Road Abbeyside<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.774371872504986,-1.0644195540277224" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.76591339201153,
-1.0666723228454202
]);

marker.bindPopup(`
<b>The Wishing Well</b><br>
Oakney Wood Drive<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.76591339201153,-1.0666723228454202" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.783124,
-1.072741
]);

marker.bindPopup(`
<b>Selby 6881-2</b><br>
York Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.783124,-1.072741" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.76760064102618,
-1.0633089795753676
]);

marker.bindPopup(`
<b>Lidl Selby</b><br>
Bawtry Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.76760064102618,-1.0633089795753676" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.782244197201635,
-1.0685002358046631
]);

marker.bindPopup(`
<b>Morrisons Selby</b><br>
Market Cross<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.782244197201635,-1.0685002358046631" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
