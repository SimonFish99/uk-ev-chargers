<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Market Harborough EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Market Harborough EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>BP Market Harborough SF Connect</strong><br>
Melton Road
</li>

<li>
<strong>Doddridge CP 1</strong><br>
Doddridge Road
</li>

<li>
<strong>Angel St CP 1</strong><br>
Angel Street Car Park
</li>

<li>
<strong>St Marys West 2</strong><br>
St Marys West Car Park
</li>

<li>
<strong>St Marys West 3</strong><br>
St Marys West Car Park
</li>

<li>
<strong>Leicester Lane</strong><br>
Leicester Lane
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
52.5108213226323,
-0.942328210113943
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
52.5108213226323,
-0.942328210113943
]).addTo(map)
.bindPopup("<b>BP Market Harborough SF Connect</b><br>Melton Road");



L.marker([
52.480934,
-0.922512
]).addTo(map)
.bindPopup("<b>Doddridge CP 1</b><br>Doddridge Road");



L.marker([
52.479373,
-0.924795
]).addTo(map)
.bindPopup("<b>Angel St CP 1</b><br>Angel Street Car Park");



L.marker([
52.47786,
-0.917761
]).addTo(map)
.bindPopup("<b>St Marys West 2</b><br>St Marys West Car Park");



L.marker([
52.477816,
-0.917758
]).addTo(map)
.bindPopup("<b>St Marys West 3</b><br>St Marys West Car Park");



L.marker([
52.494068,
-0.91771
]).addTo(map)
.bindPopup("<b>Leicester Lane</b><br>Leicester Lane");



</script>

</body>
</html>
