<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Abergavenny EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Abergavenny EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Morrisons Abergavenny</strong><br>

<li>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
51.824154,
-3.017032
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
51.824154,
-3.017032
]);

marker.bindPopup(`
<b>Morrisons Abergavenny</b><br>
Wm Morrison Supermarkets PLC<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.824154,-3.017032" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.820998,
-3.021917
]);

marker.bindPopup(`
<b>Byefield Lane Car Park, Tudor Street</b><br>
Tudor Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.820998,-3.021917" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.698887,
-2.90181
]);

marker.bindPopup(`
<b>Trinity Terrace Car Park</b><br>

<a href="https://www.google.com/maps/dir/?api=1&destination=51.698887,-2.90181" target="_blank">
Get directions
</a>

markers.addLayer(marker);



var marker = L.marker([
51.82278,
-3.034
]);

marker.bindPopup(`

var marker = L.marker([

-3.0164927560422257
]);

marker.bindPopup(`
<b>Morrisons Abergavenny</b><br>
Lion Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.8234421149773,-3.0164927560422257" target="_blank">

</a>

markers.addLayer(marker);



map.addLayer(markers);

</script>
