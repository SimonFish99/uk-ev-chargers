<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whitchurch EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Whitchurch EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Hill Valley Hotel</strong><br>
Tarporley Rd
</li>

<li>
<strong>Old Court Hotel</strong><br>
Old Court Hotel
</li>

<li>
<strong>Bell Street Car Park</strong><br>
Bell Street
</li>

<li>
<strong>Gill Nethercott Centre Car Park</strong><br>
Winchester Street
</li>

<li>
<strong>Park View Business Centre</strong><br>
 Combermere
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
52.9811482792779,
-2.68213391304016
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
52.9811482792779,
-2.68213391304016
]).addTo(map)
.bindPopup("<b>Hill Valley Hotel</b><br>Tarporley Rd");



L.marker([
51.8534890620407,
-2.65058102329044
]).addTo(map)
.bindPopup("<b>Old Court Hotel</b><br>Old Court Hotel");



L.marker([
51.22976,
-1.340807
]).addTo(map)
.bindPopup("<b>Bell Street Car Park</b><br>Bell Street");



L.marker([
51.228192,
-1.338876
]).addTo(map)
.bindPopup("<b>Gill Nethercott Centre Car Park</b><br>Winchester Street");



L.marker([
52.9924447356207,
-2.59553987889888
]).addTo(map)
.bindPopup("<b>Park View Business Centre</b><br> Combermere");



</script>

</body>
</html>
