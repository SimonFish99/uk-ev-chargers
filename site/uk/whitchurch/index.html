<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whitchurch EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Whitchurch EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Hill Valley Hotel</strong><br>
Tarporley Rd
</li>

<li>
<strong>Old Court Hotel</strong><br>
Old Court Hotel
</li>

<li>
<strong>Bell Street Car Park</strong><br>
Bell Street
</li>

<li>
<strong>Gill Nethercott Centre Car Park</strong><br>
Winchester Street
</li>

<li>
<strong>Park View Business Centre</strong><br>
 Combermere
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
52.9811482792779,
-2.68213391304016
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
52.9811482792779,
-2.68213391304016
]);

marker.bindPopup(`
<b>Hill Valley Hotel</b><br>
Tarporley Rd<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.9811482792779,-2.68213391304016" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.8534890620407,
-2.65058102329044
]);

marker.bindPopup(`
<b>Old Court Hotel</b><br>
Old Court Hotel<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.8534890620407,-2.65058102329044" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.22976,
-1.340807
]);

marker.bindPopup(`
<b>Bell Street Car Park</b><br>
Bell Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.22976,-1.340807" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.228192,
-1.338876
]);

marker.bindPopup(`
<b>Gill Nethercott Centre Car Park</b><br>
Winchester Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.228192,-1.338876" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.9924447356207,
-2.59553987889888
]);

marker.bindPopup(`
<b>Park View Business Centre</b><br>
 Combermere<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.9924447356207,-2.59553987889888" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
