<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stowmarket EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Stowmarket EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>MS Bury Street</strong><br>
Bury Street Car Park
</li>

<li>
<strong>MS Union Street</strong><br>
Union Street Car Park
</li>

<li>
<strong>MS Milton Road</strong><br>
Milton Road
</li>

<li>
<strong>SN&B Stowmarket</strong><br>
Ipswich Street
</li>

<li>
<strong>Tesco Superstore-Stowmarket</strong><br>
Cedars Link Road
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
52.19,
0.9954
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
52.19,
0.9954
]);

marker.bindPopup(`
<b>MS Bury Street</b><br>
Bury Street Car Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.19,0.9954" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.189,
0.9956
]);

marker.bindPopup(`
<b>MS Union Street</b><br>
Union Street Car Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.189,0.9956" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.1865,
0.9987
]);

marker.bindPopup(`
<b>MS Milton Road</b><br>
Milton Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.1865,0.9987" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.185,
0.9993
]);

marker.bindPopup(`
<b>SN&B Stowmarket</b><br>
Ipswich Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.185,0.9993" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.184247,
1.019011
]);

marker.bindPopup(`
<b>Tesco Superstore-Stowmarket</b><br>
Cedars Link Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.184247,1.019011" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
