<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diss EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Diss EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Home Farm</strong><br>
Home Farm, Riddlesworth
</li>

<li>
<strong>Dickleburgh</strong><br>
Dickleburgh VH
</li>

<li>
<strong>SW Lopham</strong><br>
South Lopham
</li>

<li>
<strong>Morrisons</strong><br>
Victoria Rd
</li>

<li>
<strong>Tesco Superstore-Diss</strong><br>
Victoria Road
</li>

<li>
<strong>English Electric Moto</strong><br>
Church Road
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
52.414257,
0.894631
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
52.414257,
0.894631
]);

marker.bindPopup(`
<b>Home Farm</b><br>
Home Farm, Riddlesworth<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.414257,0.894631" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.395,
1.1885
]);

marker.bindPopup(`
<b>Dickleburgh</b><br>
Dickleburgh VH<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.395,1.1885" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.3812,
1.0134
]);

marker.bindPopup(`
<b>SW Lopham</b><br>
South Lopham<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.3812,1.0134" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.37228,
1.110076
]);

marker.bindPopup(`
<b>Morrisons</b><br>
Victoria Rd<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.37228,1.110076" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.371999,
1.111564
]);

marker.bindPopup(`
<b>Tesco Superstore-Diss</b><br>
Victoria Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.371999,1.111564" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.359581,
1.02309
]);

marker.bindPopup(`
<b>English Electric Moto</b><br>
Church Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.359581,1.02309" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
