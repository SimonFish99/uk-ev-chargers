<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ellesmere Port EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Ellesmere Port EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>RAWOWNED CHESHIRE OAKS 5</strong><br>
Cheshire Oaks Way
</li>

<li>
<strong>M&S Cheshire Oaks</strong><br>
2 Stanneywood Avenue
</li>

<li>
<strong>M & S Cheshire Oaks</strong><br>
2 Stanneywood Avenue, Ellesmere Port
</li>

<li>
<strong>Boat Museum</strong><br>
South Pier Road
</li>

<li>
<strong>Shrewsbury Road Car Park</strong><br>
Grange Road
</li>

<li>
<strong>Whitby</strong><br>
Whitby
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
53.265933,
-2.880644
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
53.265933,
-2.880644
]).addTo(map)
.bindPopup("<b>RAWOWNED CHESHIRE OAKS 5</b><br>Cheshire Oaks Way");



L.marker([
53.262571,
-2.890086
]).addTo(map)
.bindPopup("<b>M&S Cheshire Oaks</b><br>2 Stanneywood Avenue");



L.marker([
53.261057,
-2.891466
]).addTo(map)
.bindPopup("<b>M & S Cheshire Oaks</b><br>2 Stanneywood Avenue, Ellesmere Port");



L.marker([
53.287571,
-2.891937
]).addTo(map)
.bindPopup("<b>Boat Museum</b><br>South Pier Road");



L.marker([
53.279549,
-2.897713
]).addTo(map)
.bindPopup("<b>Shrewsbury Road Car Park</b><br>Grange Road");



L.marker([
53.272805,
-2.911777
]).addTo(map)
.bindPopup("<b>Whitby</b><br>Whitby");



</script>

</body>
</html>
