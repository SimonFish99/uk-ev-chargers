<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Worksop EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Worksop EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Tesco Superstore - Worksop Gateford Road</strong><br>
Gateford Road
</li>

<li>
<strong>Moto Blyth Services</strong><br>
A1 (M)
</li>

<li>
<strong>Restricted access to Toyota customers</strong><br>
Retford Road
</li>

<li>
<strong>Newgate Street</strong><br>
Newgate Street
</li>

<li>
<strong>Morrisons Worksop</strong><br>
Kilton Road
</li>

<li>
<strong>Asda Worksop</strong><br>
Highgrounds Way
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
53.315544,
-1.132055
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
53.315544,
-1.132055
]).addTo(map)
.bindPopup("<b>Tesco Superstore - Worksop Gateford Road</b><br>Gateford Road");



L.marker([
53.38705,
-1.05962
]).addTo(map)
.bindPopup("<b>Moto Blyth Services</b><br>A1 (M)");



L.marker([
53.302071,
-1.096012
]).addTo(map)
.bindPopup("<b>Restricted access to Toyota customers</b><br>Retford Road");



L.marker([
53.300762,
-1.122122
]).addTo(map)
.bindPopup("<b>Newgate Street</b><br>Newgate Street");



L.marker([
53.307939,
-1.113222
]).addTo(map)
.bindPopup("<b>Morrisons Worksop</b><br>Kilton Road");



L.marker([
53.312318,
-1.1414938
]).addTo(map)
.bindPopup("<b>Asda Worksop</b><br>Highgrounds Way");



</script>

</body>
</html>
