<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cheshunt EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Cheshunt EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Tesco Extra-Cheshunt</strong><br>
Brookfield Centre
</li>

<li>
<strong>Broxbourne Council Offices 1</strong><br>
Broxbourne Council Offices
</li>

<li>
<strong>Newham Parade 3</strong><br>
Newham Parade
</li>

<li>
<strong>Windmill Lane Car Park 1</strong><br>
Windmill Lane Car Park
</li>

<li>
<strong>Birch 1</strong><br>
The Birch Hotel
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
51.7185612,
-0.0364673
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
51.7185612,
-0.0364673
]);

marker.bindPopup(`
<b>Tesco Extra-Cheshunt</b><br>
Brookfield Centre<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.7185612,-0.0364673" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.703137,
-0.048217
]);

marker.bindPopup(`
<b>Broxbourne Council Offices 1</b><br>
Broxbourne Council Offices<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.703137,-0.048217" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.703108,
-0.036584
]);

marker.bindPopup(`
<b>Newham Parade 3</b><br>
Newham Parade<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.703108,-0.036584" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.702553,
-0.033143
]);

marker.bindPopup(`
<b>Windmill Lane Car Park 1</b><br>
Windmill Lane Car Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.702553,-0.033143" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.68899,
-0.058124
]);

marker.bindPopup(`
<b>Birch 1</b><br>
The Birch Hotel<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.68899,-0.058124" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
