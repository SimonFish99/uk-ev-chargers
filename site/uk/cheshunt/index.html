<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cheshunt EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Cheshunt EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Tesco Extra-Cheshunt</strong><br>
Brookfield Centre
</li>

<li>
<strong>Broxbourne Council Offices 1</strong><br>
Broxbourne Council Offices
</li>

<li>
<strong>Newham Parade 3</strong><br>
Newham Parade
</li>

<li>
<strong>Windmill Lane Car Park 1</strong><br>
Windmill Lane Car Park
</li>

<li>
<strong>Birch 1</strong><br>
The Birch Hotel
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.7185612,
-0.0364673
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.7185612,
-0.0364673
]).addTo(map)
.bindPopup("<b>Tesco Extra-Cheshunt</b><br>Brookfield Centre");



L.marker([
51.703137,
-0.048217
]).addTo(map)
.bindPopup("<b>Broxbourne Council Offices 1</b><br>Broxbourne Council Offices");



L.marker([
51.703108,
-0.036584
]).addTo(map)
.bindPopup("<b>Newham Parade 3</b><br>Newham Parade");



L.marker([
51.702553,
-0.033143
]).addTo(map)
.bindPopup("<b>Windmill Lane Car Park 1</b><br>Windmill Lane Car Park");



L.marker([
51.68899,
-0.058124
]).addTo(map)
.bindPopup("<b>Birch 1</b><br>The Birch Hotel");



</script>

</body>
</html>
