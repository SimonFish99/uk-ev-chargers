<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lowestoft EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Lowestoft EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>McDonald's Lowestoft</strong><br>
Leisure Way
</li>

<li>
<strong>Orbis</strong><br>
Orbis Centre
</li>

<li>
<strong>North Quay Retail Park</strong><br>
North Quay Retail Park
</li>

<li>
<strong>Tesco Superstore-Lowestoft Leisure Way</strong><br>
Leisure Way
</li>

<li>
<strong>Sunnyside Holiday Home</strong><br>
6 Grayson Avenue
</li>

<li>
<strong>Orbis Energy Lowestoft</strong><br>
Wilde Street
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
52.501577083633066,
1.7353289087678831
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
52.501577083633066,
1.7353289087678831
]).addTo(map)
.bindPopup("<b>McDonald's Lowestoft</b><br>Leisure Way");



L.marker([
52.4789,
1.7614
]).addTo(map)
.bindPopup("<b>Orbis</b><br>Orbis Centre");



L.marker([
52.477586,
1.732524
]).addTo(map)
.bindPopup("<b>North Quay Retail Park</b><br>North Quay Retail Park");



L.marker([
52.502876,
1.735055
]).addTo(map)
.bindPopup("<b>Tesco Superstore-Lowestoft Leisure Way</b><br>Leisure Way");



L.marker([
52.44825501,
1.72931334
]).addTo(map)
.bindPopup("<b>Sunnyside Holiday Home</b><br>6 Grayson Avenue");



L.marker([
52.479186,
1.76065
]).addTo(map)
.bindPopup("<b>Orbis Energy Lowestoft</b><br>Wilde Street");



</script>

</body>
</html>
