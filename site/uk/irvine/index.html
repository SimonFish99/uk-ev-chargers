<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Irvine EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Irvine EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Beach Drive Car Park 1</strong><br>
Beach Drive Car Park 2
</li>

<li>
<strong>Irvine Central Car Park</strong><br>
17 George Court
</li>

<li>
<strong>Tesco Extra-Irvine Riverway</strong><br>
15-16 Riverway
</li>

<li>
<strong>Caledonia Car Park, Irvine</strong><br>
East Road Retail Park
</li>

<li>
<strong>The Circuit, Quarry Road, Irvine</strong><br>
22 Quarry Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
55.607247,
-4.685067
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
55.607247,
-4.685067
]).addTo(map)
.bindPopup(`
<b>Beach Drive Car Park 1</b><br>
Beach Drive Car Park 2<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.607247,-4.685067" target="_blank">
Get directions
</a>
`);



L.marker([
55.617198,
-4.666602
]).addTo(map)
.bindPopup(`
<b>Irvine Central Car Park</b><br>
17 George Court<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.617198,-4.666602" target="_blank">
Get directions
</a>
`);



L.marker([
55.606859,
-4.6709
]).addTo(map)
.bindPopup(`
<b>Tesco Extra-Irvine Riverway</b><br>
15-16 Riverway<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.606859,-4.6709" target="_blank">
Get directions
</a>
`);



L.marker([
55.61674,
-4.66498
]).addTo(map)
.bindPopup(`
<b>Caledonia Car Park, Irvine</b><br>
East Road Retail Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.61674,-4.66498" target="_blank">
Get directions
</a>
`);



L.marker([
55.61901,
-4.66453
]).addTo(map)
.bindPopup(`
<b>The Circuit, Quarry Road, Irvine</b><br>
22 Quarry Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.61901,-4.66453" target="_blank">
Get directions
</a>
`);



</script>

</body>
</html>
