<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Limavady EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Limavady EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>George Canning Spar Bellarena</strong><br>
436 Seacoast Rd
</li>

<li>
<strong>Lidl</strong><br>
 4 Connell Street
</li>

<li>
<strong>Benone Tourist Complex</strong><br>
53 Benone Ave
</li>

<li>
<strong>Tesco Superstore-Limavady</strong><br>
Main Street
</li>

<li>
<strong>Roe Valley Country Park</strong><br>
41 Dogleap Road
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
55.14073670739418,
-6.944193817977748
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
55.14073670739418,
-6.944193817977748
]);

marker.bindPopup(`
<b>George Canning Spar Bellarena</b><br>
436 Seacoast Rd<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.14073670739418,-6.944193817977748" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.05198290371186,
-6.9492822369352325
]);

marker.bindPopup(`
<b>Lidl</b><br>
 4 Connell Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.05198290371186,-6.9492822369352325" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.163873356746194,
-6.871422767314044
]);

marker.bindPopup(`
<b>Benone Tourist Complex</b><br>
53 Benone Ave<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.163873356746194,-6.871422767314044" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.05273446,
-6.94852001
]);

marker.bindPopup(`
<b>Tesco Superstore-Limavady</b><br>
Main Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.05273446,-6.94852001" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.024026298001075,
-6.939815373033127
]);

marker.bindPopup(`
<b>Roe Valley Country Park</b><br>
41 Dogleap Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.024026298001075,-6.939815373033127" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
