<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Limavady EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Limavady EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>George Canning Spar Bellarena</strong><br>
436 Seacoast Rd
</li>

<li>
<strong>Lidl</strong><br>
 4 Connell Street
</li>

<li>
<strong>Benone Tourist Complex</strong><br>
53 Benone Ave
</li>

<li>
<strong>Tesco Superstore-Limavady</strong><br>
Main Street
</li>

<li>
<strong>Roe Valley Country Park</strong><br>
41 Dogleap Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
55.14073670739418,
-6.944193817977748
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
55.14073670739418,
-6.944193817977748
]).addTo(map)
.bindPopup("<b>George Canning Spar Bellarena</b><br>436 Seacoast Rd");



L.marker([
55.05198290371186,
-6.9492822369352325
]).addTo(map)
.bindPopup("<b>Lidl</b><br> 4 Connell Street");



L.marker([
55.163873356746194,
-6.871422767314044
]).addTo(map)
.bindPopup("<b>Benone Tourist Complex</b><br>53 Benone Ave");



L.marker([
55.05273446,
-6.94852001
]).addTo(map)
.bindPopup("<b>Tesco Superstore-Limavady</b><br>Main Street");



L.marker([
55.024026298001075,
-6.939815373033127
]).addTo(map)
.bindPopup("<b>Roe Valley Country Park</b><br>41 Dogleap Road");



</script>

</body>
</html>
