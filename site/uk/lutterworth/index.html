<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lutterworth EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Lutterworth EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Dale Close</strong><br>
Dale Close
</li>

<li>
<strong>Iliffe Street</strong><br>
Iliffe Street
</li>

<li>
<strong>49 Lorrimore Road</strong><br>
49 Lorrimore Road
</li>

<li>
<strong>Wm Morrison Supermarkets PLC Bitteswell Road</strong><br>
Wm Morrison Supermarkets PLC Bitteswell Road
</li>

<li>

</li>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
52.45591660377312,
-1.2221312148696484
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
52.45591660377312,
-1.2221312148696484
]);

marker.bindPopup(`
<b>Dale Close</b><br>
Dale Close<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.45591660377312,-1.2221312148696484" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.4894646,
-0.1014442
]);

marker.bindPopup(`
<b>Iliffe Street</b><br>
Iliffe Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.4894646,-0.1014442" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.4848005,
-0.0989627
]);

marker.bindPopup(`
<b>49 Lorrimore Road</b><br>
49 Lorrimore Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.4848005,-0.0989627" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.45738849035371,
-1.2021795418933152
]);

marker.bindPopup(`
<b>Wm Morrison Supermarkets PLC Bitteswell Road</b><br>
Wm Morrison Supermarkets PLC Bitteswell Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.45738849035371,-1.2021795418933152" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.45478,
-1.216667
]);

marker.bindPopup(`
<b>Kingsbury Park</b><br>
Coventry Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.45478,-1.216667" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
