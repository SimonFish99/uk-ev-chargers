<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lutterworth EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Lutterworth EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Dale Close</strong><br>
Dale Close
</li>

<li>
<strong>Iliffe Street</strong><br>
Iliffe Street
</li>

<li>
<strong>49 Lorrimore Road</strong><br>
49 Lorrimore Road
</li>

<li>
<strong>Wm Morrison Supermarkets PLC Bitteswell Road</strong><br>
Wm Morrison Supermarkets PLC Bitteswell Road
</li>

<li>
<strong>Kingsbury Park</strong><br>
Coventry Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
52.45591660377312,
-1.2221312148696484
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
52.45591660377312,
-1.2221312148696484
]).addTo(map)
.bindPopup("<b>Dale Close</b><br>Dale Close");



L.marker([
51.4894646,
-0.1014442
]).addTo(map)
.bindPopup("<b>Iliffe Street</b><br>Iliffe Street");



L.marker([
51.4848005,
-0.0989627
]).addTo(map)
.bindPopup("<b>49 Lorrimore Road</b><br>49 Lorrimore Road");



L.marker([
52.45738849035371,
-1.2021795418933152
]).addTo(map)
.bindPopup("<b>Wm Morrison Supermarkets PLC Bitteswell Road</b><br>Wm Morrison Supermarkets PLC Bitteswell Road");



L.marker([
52.45478,
-1.216667
]).addTo(map)
.bindPopup("<b>Kingsbury Park</b><br>Coventry Road");



</script>

</body>
</html>
