<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pontyclun EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Pontyclun EV Chargers</h1>

<div id="map"></div>

<ul>

<li>

</li>

<li>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.506801,
-3.35311
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

}).addTo(map);



L.marker([
51.506801,
-3.35311
]).addTo(map)
.bindPopup("<b>MISKIN V21</b><br>Renishaw plc Miskin");

51.506439,

51.506204,
-3.353569
]).addTo(map)
.bindPopup("<b>MISKIN A3</b><br>Renishaw plc Miskin");



L.marker([
51.534238,
-3.389699
]).addTo(map)

L.marker([
51.55405,
-3.388255
]).addTo(map)
.bindPopup("<b>The Royal Mint Experience</b><br>Heol-Y-Sarn");



</script>
