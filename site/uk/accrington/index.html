<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Accrington EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Accrington EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Lidl-Accrington</strong><br>
Hyndburn Road
</li>

<li>
<strong>Oswaldtwistle Mills Home and LifestyleMoscow Mills</strong><br>
Colliers Street
</li>

<li>
<strong>Accrington Town Hall</strong><br>
Town Hall
</li>

<li>
<strong>Tesco Extra-Accrington</strong><br>
2 Eagle Street
</li>

<li>
<strong>ICUEVE900243</strong><br>
74 Devonshire Street
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
53.755261,
-2.381584
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
53.755261,
-2.381584
]);

marker.bindPopup(`
<b>Lidl-Accrington</b><br>
Hyndburn Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.755261,-2.381584" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.7476897409176,
-2.3915151954958
]);

marker.bindPopup(`
<b>Oswaldtwistle Mills Home and LifestyleMoscow Mills</b><br>
Colliers Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.7476897409176,-2.3915151954958" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.753189,
-2.365649
]);

marker.bindPopup(`
<b>Accrington Town Hall</b><br>
Town Hall<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.753189,-2.365649" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.751918,
-2.369849
]);

marker.bindPopup(`
<b>Tesco Extra-Accrington</b><br>
2 Eagle Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.751918,-2.369849" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.75952,
-2.368937
]);

marker.bindPopup(`
<b>ICUEVE900243</b><br>
74 Devonshire Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.75952,-2.368937" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
