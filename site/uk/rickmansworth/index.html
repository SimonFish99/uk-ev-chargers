<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rickmansworth EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Rickmansworth EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Red House</strong><br>
New Road
</li>

<li>
<strong>Tesco Superstore - Rickmansworth</strong><br>
Frogmoor Wharf

<li>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
51.64727989763699,
-0.44305305872183
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
51.64727989763699,
-0.44305305872183
]);

marker.bindPopup(`
<b>Red House</b><br>
New Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.64727989763699,-0.44305305872183" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.633611,
-0.470836
]);

marker.bindPopup(`
<b>Tesco Superstore - Rickmansworth</b><br>
Frogmoor Wharf<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.633611,-0.470836" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.625607,
-0.505838
]);

marker.bindPopup(`
<b>Nissan Motors GB Ltd 2</b><br>
10 Denham Way<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.625607,-0.505838" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.6342359862698,
-0.489028706895624
]);

marker.bindPopup(`
<b>BP - Mill End SF Connect</b><br>
Uxbridge Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.6342359862698,-0.489028706895624" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.649667,
-0.436916
]);

marker.bindPopup(`
<b>SHELL RECHARGE CROXLEY GREEN</b><br>
185-187 Watford Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.649667,-0.436916" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
