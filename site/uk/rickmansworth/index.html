<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rickmansworth EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Rickmansworth EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Red House</strong><br>
New Road
</li>

<li>
<strong>Tesco Superstore - Rickmansworth</strong><br>
Frogmoor Wharf
</li>

<li>
<strong>Nissan Motors GB Ltd 2</strong><br>
10 Denham Way
</li>

<li>
<strong>BP - Mill End SF Connect</strong><br>
Uxbridge Road
</li>

<li>
<strong>SHELL RECHARGE CROXLEY GREEN</strong><br>
185-187 Watford Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.64727989763699,
-0.44305305872183
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.64727989763699,
-0.44305305872183
]).addTo(map)
.bindPopup("<b>Red House</b><br>New Road");



L.marker([
51.633611,
-0.470836
]).addTo(map)
.bindPopup("<b>Tesco Superstore - Rickmansworth</b><br>Frogmoor Wharf");



L.marker([
51.625607,
-0.505838
]).addTo(map)
.bindPopup("<b>Nissan Motors GB Ltd 2</b><br>10 Denham Way");



L.marker([
51.6342359862698,
-0.489028706895624
]).addTo(map)
.bindPopup("<b>BP - Mill End SF Connect</b><br>Uxbridge Road");



L.marker([
51.649667,
-0.436916
]).addTo(map)
.bindPopup("<b>SHELL RECHARGE CROXLEY GREEN</b><br>185-187 Watford Road");



</script>

</body>
</html>
