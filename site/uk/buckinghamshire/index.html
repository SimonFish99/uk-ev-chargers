<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buckinghamshire EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Buckinghamshire EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>MK1 Shopping & Leisure Park</strong><br>
Stadium Way
</li>

<li>
<strong>High Wycombe Station</strong><br>
Amersham Hill
</li>

<li>
<strong>Gerrards Cross</strong><br>
12 Station Approach
</li>

<li>
<strong>EVC Chicheley Hall Hotel</strong><br>
Chicheley Hall Hotel
</li>

<li>
<strong>Chilton Business Centre</strong><br>
Chilton
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
52.010065,
-0.735957
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
52.010065,
-0.735957
]).addTo(map)
.bindPopup("<b>MK1 Shopping & Leisure Park</b><br>Stadium Way");



L.marker([
51.629814,
-0.746236
]).addTo(map)
.bindPopup("<b>High Wycombe Station</b><br>Amersham Hill");



L.marker([
51.58892,
-0.555095
]).addTo(map)
.bindPopup("<b>Gerrards Cross</b><br>12 Station Approach");



L.marker([
52.10382507,
-0.679276536
]).addTo(map)
.bindPopup("<b>EVC Chicheley Hall Hotel</b><br>Chicheley Hall Hotel");



L.marker([
51.80176,
-1.004281
]).addTo(map)
.bindPopup("<b>Chilton Business Centre</b><br>Chilton");



</script>

</body>
</html>
