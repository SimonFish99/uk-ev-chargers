<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buckinghamshire EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Buckinghamshire EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>MK1 Shopping & Leisure Park</strong><br>
Stadium Way
</li>

<li>
<strong>High Wycombe Station</strong><br>
Amersham Hill
</li>

<li>
<strong>Gerrards Cross</strong><br>
12 Station Approach
</li>

<li>
<strong>EVC Chicheley Hall Hotel</strong><br>
Chicheley Hall Hotel
</li>

<li>
<strong>Chilton Business Centre</strong><br>
Chilton
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
52.010065,
-0.735957
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
52.010065,
-0.735957
]);

marker.bindPopup(`
<b>MK1 Shopping & Leisure Park</b><br>
Stadium Way<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.010065,-0.735957" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.629814,
-0.746236
]);

marker.bindPopup(`
<b>High Wycombe Station</b><br>
Amersham Hill<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.629814,-0.746236" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.58892,
-0.555095
]);

marker.bindPopup(`
<b>Gerrards Cross</b><br>
12 Station Approach<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.58892,-0.555095" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.10382507,
-0.679276536
]);

marker.bindPopup(`
<b>EVC Chicheley Hall Hotel</b><br>
Chicheley Hall Hotel<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.10382507,-0.679276536" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.80176,
-1.004281
]);

marker.bindPopup(`
<b>Chilton Business Centre</b><br>
Chilton<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.80176,-1.004281" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
