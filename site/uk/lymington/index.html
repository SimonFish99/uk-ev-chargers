<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lymington EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Lymington EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Genie</strong><br>
EVT Warehouse
</li>

<li>
<strong>Shell Lymington</strong><br>
33 Milford Road
</li>

<li>
<strong>Bath Road 1</strong><br>
Bath Road Car Park
</li>

<li>
<strong>EVC Macdonald Elmers Court Hotel & Resort</strong><br>
S Baddesley Rd
</li>

<li>
<strong>Barfields 2</strong><br>
Barfields Car Park
</li>

<li>
<strong>Bath Road Car Park</strong><br>
Bath Road Car Park
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
5,
4.999684
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
5,
4.999684
]).addTo(map)
.bindPopup("<b>Genie</b><br>EVT Warehouse");



L.marker([
50.75077984006549,
-1.5534308743415295
]).addTo(map)
.bindPopup("<b>Shell Lymington</b><br>33 Milford Road");



L.marker([
50.75556,
-1.52932
]).addTo(map)
.bindPopup("<b>Bath Road 1</b><br>Bath Road Car Park");



L.marker([
50.75909602982677,
-1.5241083311358075
]).addTo(map)
.bindPopup("<b>EVC Macdonald Elmers Court Hotel & Resort</b><br>S Baddesley Rd");



L.marker([
50.76022,
-1.54506
]).addTo(map)
.bindPopup("<b>Barfields 2</b><br>Barfields Car Park");



L.marker([
50.75445,
-1.52918
]).addTo(map)
.bindPopup("<b>Bath Road Car Park</b><br>Bath Road Car Park");



</script>

</body>
</html>
