<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stranraer EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Stranraer EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Stranraer Services</strong><br>
1 Bellevilla Road
</li>

<li>
<strong>Garo Dual 7KW</strong><br>
Fisher St Car Park
</li>

<li>
<strong>Tesco Superstore-Stranraer</strong><br>
Charlotte Street
</li>

<li>
<strong>Sands of Luce Holiday Park</strong><br>
Sandhead
</li>

<li>
<strong>Galloway Community Hospital</strong><br>
Dalrymple Street
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
54.904956,
-5.022548
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
54.904956,
-5.022548
]).addTo(map)
.bindPopup("<b>Stranraer Services</b><br>1 Bellevilla Road");



L.marker([
54.90567,
-5.02844
]).addTo(map)
.bindPopup("<b>Garo Dual 7KW</b><br>Fisher St Car Park");



L.marker([
54.905212,
-5.024963
]).addTo(map)
.bindPopup("<b>Tesco Superstore-Stranraer</b><br>Charlotte Street");



L.marker([
54.81503,
-4.95795
]).addTo(map)
.bindPopup("<b>Sands of Luce Holiday Park</b><br>Sandhead");



L.marker([
54.8986,
-5.02089
]).addTo(map)
.bindPopup("<b>Galloway Community Hospital</b><br>Dalrymple Street");



</script>

</body>
</html>
