<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stranraer EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Stranraer EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Stranraer Services</strong><br>
1 Bellevilla Road
</li>

<li>
<strong>Garo Dual 7KW</strong><br>
Fisher St Car Park
</li>

<li>
<strong>Tesco Superstore-Stranraer</strong><br>
Charlotte Street
</li>

<li>
<strong>Sands of Luce Holiday Park</strong><br>
Sandhead
</li>

<li>
<strong>Galloway Community Hospital</strong><br>
Dalrymple Street
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
54.904956,
-5.022548
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
54.904956,
-5.022548
]);

marker.bindPopup(`
<b>Stranraer Services</b><br>
1 Bellevilla Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.904956,-5.022548" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
54.90567,
-5.02844
]);

marker.bindPopup(`
<b>Garo Dual 7KW</b><br>
Fisher St Car Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.90567,-5.02844" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
54.905212,
-5.024963
]);

marker.bindPopup(`
<b>Tesco Superstore-Stranraer</b><br>
Charlotte Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.905212,-5.024963" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
54.81503,
-4.95795
]);

marker.bindPopup(`
<b>Sands of Luce Holiday Park</b><br>
Sandhead<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.81503,-4.95795" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
54.8986,
-5.02089
]);

marker.bindPopup(`
<b>Galloway Community Hospital</b><br>
Dalrymple Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.8986,-5.02089" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
