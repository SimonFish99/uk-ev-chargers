<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Falmouth EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Falmouth EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>McDonald's Falmouth</strong><br>
Dracaena Avenue
</li>

<li>
<strong>The Dell Car Park</strong><br>
Grovehill Crescent
</li>

<li>
<strong>Town Quarry Car Park</strong><br>
Quarry Hill
</li>

<li>
<strong>Britannia Lanes</strong><br>
Bickland Water RD
</li>

<li>
<strong>Grove Place Car Park</strong><br>
Grove Place
</li>

<li>
<strong>Merchants Manor Gym & Swim</strong><br>
1 Western Terrace
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
50.16219011807888,
-5.087119756547935
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
50.16219011807888,
-5.087119756547935
]).addTo(map)
.bindPopup("<b>McDonald's Falmouth</b><br>Dracaena Avenue");



L.marker([
50.14898493720361,
-5.064095921548358
]).addTo(map)
.bindPopup("<b>The Dell Car Park</b><br>Grovehill Crescent");



L.marker([
50.15544497158538,
-5.074741338297287
]).addTo(map)
.bindPopup("<b>Town Quarry Car Park</b><br>Quarry Hill");



L.marker([
50.153068,
-5.099616
]).addTo(map)
.bindPopup("<b>Britannia Lanes</b><br>Bickland Water RD");



L.marker([
50.15102502684164,
-5.063736410775448
]).addTo(map)
.bindPopup("<b>Grove Place Car Park</b><br>Grove Place");



L.marker([
50.1483,
-5.0741
]).addTo(map)
.bindPopup("<b>Merchants Manor Gym & Swim</b><br>1 Western Terrace");



</script>

</body>
</html>
