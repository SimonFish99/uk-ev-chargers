<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seaham EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Seaham EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>DCC South Railway Street</strong><br>
South Railway street
</li>

<li>
<strong>DCC Green Street Car Park</strong><br>
Green Street Car Park
</li>

<li>
<strong>Green Street Car Park</strong><br>
Interchange
</li>

<li>
<strong>Dalton Park Outlet</strong><br>
Murton
</li>

<li>
<strong>Terrace Green Car Park</strong><br>
Terrace Green 
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
54.83796,
-1.333919
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
54.83796,
-1.333919
]);

marker.bindPopup(`
<b>DCC South Railway Street</b><br>
South Railway street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.83796,-1.333919" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
54.837566,
-1.332179
]);

marker.bindPopup(`
<b>DCC Green Street Car Park</b><br>
Green Street Car Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.837566,-1.332179" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
54.836919221599516,
-1.3324210307181374
]);

marker.bindPopup(`
<b>Green Street Car Park</b><br>
Interchange<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.836919221599516,-1.3324210307181374" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
54.815107,
-1.375189
]);

marker.bindPopup(`
<b>Dalton Park Outlet</b><br>
Murton<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.815107,-1.375189" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
54.840193,
-1.332386
]);

marker.bindPopup(`
<b>Terrace Green Car Park</b><br>
Terrace Green <br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.840193,-1.332386" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
