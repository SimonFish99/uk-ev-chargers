<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Londonderry EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Londonderry EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Ulster University Magee Campus</strong><br>
Northland Rd
</li>

<li>
<strong>HRL Rossdowney</strong><br>
1 Rossdowney Park
</li>

<li>
<strong>Templemore Leisure Centre Car Park</strong><br>
Templemore Leisure Centre
</li>

<li>
<strong>The Diamond</strong><br>
The Diamond
</li>

<li>
<strong>Ness Country Park</strong><br>
50 Oughtagh Road
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
55.00561267210057,
-7.324701032553548
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
55.00561267210057,
-7.324701032553548
]);

marker.bindPopup(`
<b>Ulster University Magee Campus</b><br>
Northland Rd<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.00561267210057,-7.324701032553548" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
54.9939201427296,
-7.30266989783439
]);

marker.bindPopup(`
<b>HRL Rossdowney</b><br>
1 Rossdowney Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.9939201427296,-7.30266989783439" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.024553,
-7.338951
]);

marker.bindPopup(`
<b>Templemore Leisure Centre Car Park</b><br>
Templemore Leisure Centre<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.024553,-7.338951" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
54.99548,
-7.32185
]);

marker.bindPopup(`
<b>The Diamond</b><br>
The Diamond<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.99548,-7.32185" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
54.941279786337645,
-7.190186703209434
]);

marker.bindPopup(`
<b>Ness Country Park</b><br>
50 Oughtagh Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.941279786337645,-7.190186703209434" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
