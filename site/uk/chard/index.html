<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chard EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Chard EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Marketfield 1</strong><br>
Marketfield Car Park
</li>

<li>
<strong>EVC The Lordleaze Hotel</strong><br>
Henderson Drive
</li>

<li>
<strong>Tesco Superstore-Chard</strong><br>
Tapstone Road
</li>

<li>
<strong>Warner Leisure Hotel</strong><br>
Cricket St. Thomas Hotel
</li>

<li>
<strong>Lidl</strong><br>
Tapstone Road
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
50.87253,
-2.96192
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
50.87253,
-2.96192
]);

marker.bindPopup(`
<b>Marketfield 1</b><br>
Marketfield Car Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=50.87253,-2.96192" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
50.868598850595575,
-2.9488625458461764
]);

marker.bindPopup(`
<b>EVC The Lordleaze Hotel</b><br>
Henderson Drive<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=50.868598850595575,-2.9488625458461764" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
50.873873,
-2.95357
]);

marker.bindPopup(`
<b>Tesco Superstore-Chard</b><br>
Tapstone Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=50.873873,-2.95357" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
50.87413794827157,
-2.8927476416163245
]);

marker.bindPopup(`
<b>Warner Leisure Hotel</b><br>
Cricket St. Thomas Hotel<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=50.87413794827157,-2.8927476416163245" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
50.8739748298222,
-2.95620076421494
]);

marker.bindPopup(`
<b>Lidl</b><br>
Tapstone Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=50.8739748298222,-2.95620076421494" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
