<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chard EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Chard EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Marketfield 1</strong><br>
Marketfield Car Park
</li>

<li>
<strong>EVC The Lordleaze Hotel</strong><br>
Henderson Drive
</li>

<li>
<strong>Tesco Superstore-Chard</strong><br>
Tapstone Road
</li>

<li>
<strong>Warner Leisure Hotel</strong><br>
Cricket St. Thomas Hotel
</li>

<li>

</li>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
50.87253,
-2.96192
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
50.87253,
-2.96192
]).addTo(map)
.bindPopup(`
<b>Marketfield 1</b><br>
Marketfield Car Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=50.87253,-2.96192" target="_blank">

</a>
`);



L.marker([
50.868598850595575,
-2.9488625458461764
]).addTo(map)

</a>

L.marker([
50.873873,
-2.95357
]).addTo(map)

Tapstone Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=50.873873,-2.95357" target="_blank">
Get directions
</a>
`);



L.marker([
50.87413794827157,
-2.8927476416163245

</a>

L.marker([
50.8739748298222,

</script>

</body>
</html>
