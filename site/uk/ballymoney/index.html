<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ballymoney EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Ballymoney EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Solo</strong><br>
Frosses Road
</li>

<li>
<strong>Lidl</strong><br>
Meetinghouse Street
</li>

<li>
<strong>HRL Route</strong><br>
8 Ballybogey Road
</li>

<li>
<strong>DRD Car Park Townhead Street North</strong><br>
20 Townhead Street
</li>

<li>
<strong>Basil Knipe Electrics</strong><br>
41 Ballymena Road
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
54.9975153057313,
-6.352853632610731
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
54.9975153057313,
-6.352853632610731
]);

marker.bindPopup(`
<b>Solo</b><br>
Frosses Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=54.9975153057313,-6.352853632610731" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.068651413856315,
-6.5141194648608405
]);

marker.bindPopup(`
<b>Lidl</b><br>
Meetinghouse Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.068651413856315,-6.5141194648608405" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.08023667376938,
-6.525080847838979
]);

marker.bindPopup(`
<b>HRL Route</b><br>
8 Ballybogey Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.08023667376938,-6.525080847838979" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.071775,
-6.519416
]);

marker.bindPopup(`
<b>DRD Car Park Townhead Street North</b><br>
20 Townhead Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.071775,-6.519416" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.06808519174635,
-6.494050112335458
]);

marker.bindPopup(`
<b>Basil Knipe Electrics</b><br>
41 Ballymena Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.06808519174635,-6.494050112335458" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
