<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clitheroe EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Clitheroe EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Ribble Valley 6831-2</strong><br>
Chester Avenue Car Park
</li>

<li>
<strong>George Street</strong><br>
Whalley
</li>

<li>
<strong>Railway View Car Park</strong><br>
View Avenue
</li>

<li>
<strong>Chester Avenue Car Park</strong><br>
Chester Avenue
</li>

<li>
<strong>Tesco Superstore Clitheroe</strong><br>
Duck St
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
53.875468,
-2.394259
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
53.875468,
-2.394259
]).addTo(map)
.bindPopup("<b>Ribble Valley 6831-2</b><br>Chester Avenue Car Park");



L.marker([
53.821857,
-2.407003
]).addTo(map)
.bindPopup("<b>George Street</b><br>Whalley");



L.marker([
53.87353195252669,
-2.3920529276845173
]).addTo(map)
.bindPopup("<b>Railway View Car Park</b><br>View Avenue");



L.marker([
53.87478729089284,
-2.394649614183095
]).addTo(map)
.bindPopup("<b>Chester Avenue Car Park</b><br>Chester Avenue");



L.marker([
53.8727409515003,
-2.3881372943149
]).addTo(map)
.bindPopup("<b>Tesco Superstore Clitheroe</b><br>Duck St");



</script>

</body>
</html>
