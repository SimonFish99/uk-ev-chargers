<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clitheroe EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Clitheroe EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Ribble Valley 6831-2</strong><br>
Chester Avenue Car Park
</li>

<li>
<strong>George Street</strong><br>
Whalley
</li>

<li>
<strong>Railway View Car Park</strong><br>
View Avenue
</li>

<li>
<strong>Chester Avenue Car Park</strong><br>
Chester Avenue
</li>

<li>
<strong>Tesco Superstore Clitheroe</strong><br>
Duck St
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
53.875468,
-2.394259
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
53.875468,
-2.394259
]);

marker.bindPopup(`
<b>Ribble Valley 6831-2</b><br>
Chester Avenue Car Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.875468,-2.394259" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.821857,
-2.407003
]);

marker.bindPopup(`
<b>George Street</b><br>
Whalley<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.821857,-2.407003" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.87353195252669,
-2.3920529276845173
]);

marker.bindPopup(`
<b>Railway View Car Park</b><br>
View Avenue<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.87353195252669,-2.3920529276845173" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.87478729089284,
-2.394649614183095
]);

marker.bindPopup(`
<b>Chester Avenue Car Park</b><br>
Chester Avenue<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.87478729089284,-2.394649614183095" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.8727409515003,
-2.3881372943149
]);

marker.bindPopup(`
<b>Tesco Superstore Clitheroe</b><br>
Duck St<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.8727409515003,-2.3881372943149" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
