<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galashiels EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Galashiels EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Stow Station</strong><br>
30 Station Road
</li>

<li>
<strong>Tesco Extra - Galashiels</strong><br>
Paton Street
</li>

<li>
<strong>Tweedbank Station</strong><br>
3 Tweedbank Avenue
</li>

<li>
<strong>Scottish Public Pensions Agency (SPPA)</strong><br>
7 Tweedside Park
</li>

<li>
<strong>Tesco Extra - Galashiels</strong><br>
 Paton Street
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
55.692171,
-2.86545
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
55.692171,
-2.86545
]);

marker.bindPopup(`
<b>Stow Station</b><br>
30 Station Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.692171,-2.86545" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.614634,
-2.805155
]);

marker.bindPopup(`
<b>Tesco Extra - Galashiels</b><br>
Paton Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.614634,-2.805155" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.604795,
-2.75983
]);

marker.bindPopup(`
<b>Tweedbank Station</b><br>
3 Tweedbank Avenue<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.604795,-2.75983" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.604601,
-2.752472
]);

marker.bindPopup(`
<b>Scottish Public Pensions Agency (SPPA)</b><br>
7 Tweedside Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.604601,-2.752472" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.6150491234923,
-2.80471946161185
]);

marker.bindPopup(`
<b>Tesco Extra - Galashiels</b><br>
 Paton Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.6150491234923,-2.80471946161185" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
