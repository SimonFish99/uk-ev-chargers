<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mold EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Mold EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Griffiths Square Car Park</strong><br>
Bryn Garmon
</li>

<li>
<strong>New Street Car Park Mold</strong><br>
New Street
</li>

<li>
<strong>Beaufort Park Hotel</strong><br>
New Brighton
</li>

<li>
<strong>McDonald's North Wales Expressway</strong><br>
Gateway Services
</li>

<li>
<strong>King Street</strong><br>
King Street
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
53.16841,
-3.14431
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
53.16841,
-3.14431
]).addTo(map)
.bindPopup(`
<b>Griffiths Square Car Park</b><br>
Bryn Garmon<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.16841,-3.14431" target="_blank">
Get directions
</a>
`);



L.marker([
53.16545,
-3.14291
]).addTo(map)
.bindPopup(`
<b>New Street Car Park Mold</b><br>
New Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.16545,-3.14291" target="_blank">
Get directions
</a>
`);



L.marker([
53.181515,
-3.117729
]).addTo(map)
.bindPopup(`
<b>Beaufort Park Hotel</b><br>
New Brighton<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.181515,-3.117729" target="_blank">
Get directions
</a>
`);



L.marker([
53.1922865,
-3.0809639
]).addTo(map)
.bindPopup(`
<b>McDonald's North Wales Expressway</b><br>
Gateway Services<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.1922865,-3.0809639" target="_blank">
Get directions
</a>

L.marker([
53.16904245314336,
-3.1394383831452615
]).addTo(map)
.bindPopup(`
<b>King Street</b><br>
King Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.16904245314336,-3.1394383831452615" target="_blank">
Get directions
</a>
`);



</script>

</body>
</html>
