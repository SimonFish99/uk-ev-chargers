<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calne EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Calne EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Calne Leisure Centre</strong><br>
White Horse Way
</li>

<li>
<strong>Beverbrook Sports Centre 1</strong><br>
Beversbrook Lane
</li>

<li>
<strong>Beversbrook Sports Facility</strong><br>
Beversbrook Road
</li>

<li>
<strong>Bowood Hotel Spa and Golf Resort</strong><br>
Derry Hill
</li>

<li>
<strong>Bowood Hotel Spa and Golf Resort </strong><br>
Derry Hill
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.429627,
-2.00055
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.429627,
-2.00055
]).addTo(map)
.bindPopup("<b>Calne Leisure Centre</b><br>White Horse Way");



L.marker([
51.453915,
-2.002697
]).addTo(map)
.bindPopup("<b>Beverbrook Sports Centre 1</b><br>Beversbrook Lane");



L.marker([
51.45440915491446,
-2.0024402798982237
]).addTo(map)
.bindPopup("<b>Beversbrook Sports Facility</b><br>Beversbrook Road");



L.marker([
51.42819,
-2.056527
]).addTo(map)
.bindPopup("<b>Bowood Hotel Spa and Golf Resort</b><br>Derry Hill");



L.marker([
51.42866414451436,
-2.0388009687009117
]).addTo(map)
.bindPopup("<b>Bowood Hotel Spa and Golf Resort </b><br>Derry Hill");



</script>

</body>
</html>
