<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brighouse EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Brighouse EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Hartshead Moor East Supercharger</strong><br>
M62 Junction 25/26
</li>

<li>
<strong>Hartshead Moor West Supercharger</strong><br>
M62 Junction 25/26
</li>

<li>
<strong>Household Waste Recycling Centre</strong><br>
Atlas Mill Road
</li>

<li>
<strong>Parsonage Lane Car Park</strong><br>
20 Church Ln

<li>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

53.7119356597463,
-1.7466530393886615
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
53.7119356597463,
-1.7466530393886615

.bindPopup(`

53.71441557983812,
-1.7429971449622599
