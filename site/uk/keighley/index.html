<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Keighley EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Keighley EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Mill Lane 1</strong><br>
Steeton
</li>

<li>
<strong>Gas St Car Park 1</strong><br>
Haworth
</li>

<li>
<strong>Church Green</strong><br>
Market Street
</li>

<li>
<strong>Morrisons Keighley</strong><br>
Worth Way
</li>

<li>
<strong>Scott Street Car Park</strong><br>
Scott Street
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
53.895464,
-1.950309
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
53.895464,
-1.950309
]).addTo(map)
.bindPopup("<b>Mill Lane 1</b><br>Steeton");



L.marker([
53.831676,
-1.947406
]).addTo(map)
.bindPopup("<b>Gas St Car Park 1</b><br>Haworth");



L.marker([
53.86565075617074,
-1.9086770548365166
]).addTo(map)
.bindPopup("<b>Church Green</b><br>Market Street");



L.marker([
53.86332,
-1.908206
]).addTo(map)
.bindPopup("<b>Morrisons Keighley</b><br>Worth Way");



L.marker([
53.866929,
-1.910474
]).addTo(map)
.bindPopup("<b>Scott Street Car Park</b><br>Scott Street");



</script>

</body>
</html>
