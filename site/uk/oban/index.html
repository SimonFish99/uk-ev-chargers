<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oban EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Oban EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Tesco Superstore-Oban</strong><br>
Lochside
</li>

<li>
<strong>Oban Railway Station, Oban</strong><br>
Railway Pier
</li>

<li>
<strong>Glenshellech House, Oban</strong><br>
7e Glengallan Road
</li>

<li>
<strong>Loch Melfort Hotel, Oban</strong><br>
Arduaine
</li>

<li>
<strong>Oban Bay Hotel and Spa, Oban</strong><br>
Corran Esplanade
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
56.409965,
-5.471911
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
56.409965,
-5.471911
]).addTo(map)
.bindPopup(`
<b>Tesco Superstore-Oban</b><br>
Lochside<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=56.409965,-5.471911" target="_blank">
Get directions
</a>
`);



L.marker([
56.412409,
-5.474351
]).addTo(map)
.bindPopup(`
<b>Oban Railway Station, Oban</b><br>
Railway Pier<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=56.412409,-5.474351" target="_blank">
Get directions
</a>
`);



L.marker([
56.39654,
-5.48842
]).addTo(map)
.bindPopup(`
<b>Glenshellech House, Oban</b><br>
7e Glengallan Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=56.39654,-5.48842" target="_blank">
Get directions
</a>
`);



L.marker([
56.235196,
-5.554031
]).addTo(map)
.bindPopup(`
<b>Loch Melfort Hotel, Oban</b><br>
Arduaine<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=56.235196,-5.554031" target="_blank">
Get directions
</a>
`);



L.marker([
56.41979,
-5.47977
]).addTo(map)
.bindPopup(`
<b>Oban Bay Hotel and Spa, Oban</b><br>
Corran Esplanade<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=56.41979,-5.47977" target="_blank">
Get directions
</a>
`);



</script>

</body>
</html>
