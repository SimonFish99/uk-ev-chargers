<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oban EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Oban EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Tesco Superstore-Oban</strong><br>
Lochside
</li>

<li>
<strong>Oban Railway Station, Oban</strong><br>
Railway Pier
</li>

<li>
<strong>Glenshellech House, Oban</strong><br>
7e Glengallan Road
</li>

<li>
<strong>Loch Melfort Hotel, Oban</strong><br>
Arduaine
</li>

<li>
<strong>Oban Bay Hotel and Spa, Oban</strong><br>
Corran Esplanade
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
56.409965,
-5.471911
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
56.409965,
-5.471911
]);

marker.bindPopup(`
<b>Tesco Superstore-Oban</b><br>
Lochside<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=56.409965,-5.471911" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
56.412409,
-5.474351
]);

marker.bindPopup(`
<b>Oban Railway Station, Oban</b><br>
Railway Pier<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=56.412409,-5.474351" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
56.39654,
-5.48842
]);

marker.bindPopup(`
<b>Glenshellech House, Oban</b><br>
7e Glengallan Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=56.39654,-5.48842" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
56.235196,
-5.554031
]);

marker.bindPopup(`
<b>Loch Melfort Hotel, Oban</b><br>
Arduaine<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=56.235196,-5.554031" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
56.41979,
-5.47977
]);

marker.bindPopup(`
<b>Oban Bay Hotel and Spa, Oban</b><br>
Corran Esplanade<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=56.41979,-5.47977" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
