<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cardigan EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Cardigan EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Poppit Sands Car Park, Poppit Sands</strong><br>
St. Dogmaels
</li>

<li>
<strong>Tesco Superstore - Cardigan</strong><br>
Aberystwyth Road
</li>

<li>
<strong>Greenfield Square Car Park Cardigan</strong><br>
Greenfield Square
</li>

<li>
<strong>Fairfields Car Park</strong><br>
Williams Terrace
</li>

<li>
<strong>Cardigan Leisure Centre</strong><br>
Park Place
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
52.104284,
-4.699214
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
52.104284,
-4.699214
]).addTo(map)
.bindPopup("<b>Poppit Sands Car Park, Poppit Sands</b><br>St. Dogmaels");



L.marker([
52.089229,
-4.646169
]).addTo(map)
.bindPopup("<b>Tesco Superstore - Cardigan</b><br>Aberystwyth Road");



L.marker([
52.084759,
-4.661248
]).addTo(map)
.bindPopup("<b>Greenfield Square Car Park Cardigan</b><br>Greenfield Square");



L.marker([
52.084221,
-4.657995
]).addTo(map)
.bindPopup("<b>Fairfields Car Park</b><br>Williams Terrace");



L.marker([
52.08823390975607,
-4.656937486171046
]).addTo(map)
.bindPopup("<b>Cardigan Leisure Centre</b><br>Park Place");



</script>

</body>
</html>
