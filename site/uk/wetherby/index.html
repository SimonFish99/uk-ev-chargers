<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wetherby EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Wetherby EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>RAWOWNED BOWCLIFFE HALL1</strong><br>
Bowcliffe Road Bramham
</li>

<li>
<strong>Crossley Street Car Park</strong><br>
Crossley Street
</li>

<li>
<strong>Boston Spa High Street</strong><br>
High street Car Park
</li>

<li>
<strong>Bowcliffe Hall</strong><br>
Bowcliffe Hall Estate
</li>

<li>
<strong>Wood Hall Hotel and Spa</strong><br>
Trip Lane
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
53.874445,
-1.353047
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
53.874445,
-1.353047
]);

marker.bindPopup(`
<b>RAWOWNED BOWCLIFFE HALL1</b><br>
Bowcliffe Road Bramham<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.874445,-1.353047" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.93032350503083,
-1.3880429257601463
]);

marker.bindPopup(`
<b>Crossley Street Car Park</b><br>
Crossley Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.93032350503083,-1.3880429257601463" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.905762,
-1.34925
]);

marker.bindPopup(`
<b>Boston Spa High Street</b><br>
High street Car Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.905762,-1.34925" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.87482473853228,
-1.3550154123601033
]);

marker.bindPopup(`
<b>Bowcliffe Hall</b><br>
Bowcliffe Hall Estate<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.87482473853228,-1.3550154123601033" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.91658,
-1.439875
]);

marker.bindPopup(`
<b>Wood Hall Hotel and Spa</b><br>
Trip Lane<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.91658,-1.439875" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
