<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wetherby EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Wetherby EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>RAWOWNED BOWCLIFFE HALL1</strong><br>
Bowcliffe Road Bramham
</li>

<li>
<strong>Crossley Street Car Park</strong><br>
Crossley Street
</li>

<li>
<strong>Boston Spa High Street</strong><br>
High street Car Park
</li>

<li>
<strong>Bowcliffe Hall</strong><br>
Bowcliffe Hall Estate
</li>

<li>
<strong>Wood Hall Hotel and Spa</strong><br>
Trip Lane
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
53.874445,
-1.353047
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
53.874445,
-1.353047
]).addTo(map)
.bindPopup("<b>RAWOWNED BOWCLIFFE HALL1</b><br>Bowcliffe Road Bramham");



L.marker([
53.93032350503083,
-1.3880429257601463
]).addTo(map)
.bindPopup("<b>Crossley Street Car Park</b><br>Crossley Street");



L.marker([
53.905762,
-1.34925
]).addTo(map)
.bindPopup("<b>Boston Spa High Street</b><br>High street Car Park");



L.marker([
53.87482473853228,
-1.3550154123601033
]).addTo(map)
.bindPopup("<b>Bowcliffe Hall</b><br>Bowcliffe Hall Estate");



L.marker([
53.91658,
-1.439875
]).addTo(map)
.bindPopup("<b>Wood Hall Hotel and Spa</b><br>Trip Lane");



</script>

</body>
</html>
