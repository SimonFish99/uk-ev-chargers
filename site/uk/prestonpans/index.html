<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prestonpans EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Prestonpans EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Lidl-Prestonpans</strong><br>
High Street
</li>

<li>
<strong>Pennypit Centre, Prestonpans</strong><br>
Pennypit Centre
</li>

<li>
<strong>North Grange Avenue, Prestonpans</strong><br>
North Grange Avenue
</li>

<li>
<strong>Community Centre, Prestonpans</strong><br>
Community Centre
</li>

<li>
<strong>Prestonpans Railway Station, Prestonpans</strong><br>
Johnnie Cope's Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
55.9629873,
-2.977212
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
55.9629873,
-2.977212
]).addTo(map)
.bindPopup("<b>Lidl-Prestonpans</b><br>High Street");



L.marker([
55.957944,
-2.987167
]).addTo(map)
.bindPopup("<b>Pennypit Centre, Prestonpans</b><br>Pennypit Centre");



L.marker([
55.956333,
-2.986361
]).addTo(map)
.bindPopup("<b>North Grange Avenue, Prestonpans</b><br>North Grange Avenue");



L.marker([
55.955936,
-2.974856
]).addTo(map)
.bindPopup("<b>Community Centre, Prestonpans</b><br>Community Centre");



L.marker([
55.95328,
-2.97422
]).addTo(map)
.bindPopup("<b>Prestonpans Railway Station, Prestonpans</b><br>Johnnie Cope's Road");



</script>

</body>
</html>
