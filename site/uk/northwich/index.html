<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Northwich EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Northwich EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Weaver's Whistle Pub & Restaurant</strong><br>
471 Manchester Road
</li>

<li>
<strong>EVC Nunsmere Hall Hotel</strong><br>
Nunsmere Hall Hotel
</li>

<li>
<strong>SureStore - Self Storage Northwich</strong><br>
Unit 1 & 2
</li>

<li>
<strong>Park Street Car Park</strong><br>
Park Street
</li>

<li>
<strong>Tesco Superstore-Northwich</strong><br>
Manchester Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
53.271761,
-2.455043
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
53.271761,
-2.455043
]).addTo(map)
.bindPopup("<b>Weaver's Whistle Pub & Restaurant</b><br>471 Manchester Road");



L.marker([
53.21452327,
-2.614139796
]).addTo(map)
.bindPopup("<b>EVC Nunsmere Hall Hotel</b><br>Nunsmere Hall Hotel");



L.marker([
53.261075,
-2.505586
]).addTo(map)
.bindPopup("<b>SureStore - Self Storage Northwich</b><br>Unit 1 & 2");



L.marker([
53.255859,
-2.52349
]).addTo(map)
.bindPopup("<b>Park Street Car Park</b><br>Park Street");



L.marker([
53.262553,
-2.495281
]).addTo(map)
.bindPopup("<b>Tesco Superstore-Northwich</b><br>Manchester Road");



</script>

</body>
</html>
