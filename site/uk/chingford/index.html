<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chingford EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Chingford EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Yardely Lane</strong><br>
Yardely Lane
</li>

<li>
<strong>Royston Avenue</strong><br>
Royston Avenue
</li>

<li>
<strong>Studley Avenue</strong><br>
Studley Avenue
</li>

<li>
<strong>Pretoria Road</strong><br>
Pretoria Road
</li>

<li>
<strong>Larkswood Road</strong><br>
Larkswood Road
</li>

<li>
<strong>Chingford Rd</strong><br>
Chingford Rd
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
51.641521,
-0.01084
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
51.641521,
-0.01084
]);

marker.bindPopup(`
<b>Yardely Lane</b><br>
Yardely Lane<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.641521,-0.01084" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.61092,
-0.013062
]);

marker.bindPopup(`
<b>Royston Avenue</b><br>
Royston Avenue<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.61092,-0.013062" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.605035,
-0.000369
]);

marker.bindPopup(`
<b>Studley Avenue</b><br>
Studley Avenue<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.605035,-0.000369" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.630024,
0.000965
]);

marker.bindPopup(`
<b>Pretoria Road</b><br>
Pretoria Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.630024,0.000965" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.615057,
-0.016845
]);

marker.bindPopup(`
<b>Larkswood Road</b><br>
Larkswood Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.615057,-0.016845" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.607311,
-0.020777
]);

marker.bindPopup(`
<b>Chingford Rd</b><br>
Chingford Rd<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.607311,-0.020777" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
