<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Borehamwood EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Borehamwood EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Green Turtle Energy Stirling Court</strong><br>
Stirling Way
</li>

<li>
<strong>The Stables</strong><br>
Cowley Hill
</li>

<li>
<strong>Tesco Extra-Borehamwood</strong><br>
Shenley Road
</li>

<li>
<strong>Lidl-Borehamwood</strong><br>
Lupa House
</li>

<li>
<strong>McDonald's Borehamwood</strong><br>
213 Shenley Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.647055133387596,
-0.25299791737143096
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.647055133387596,
-0.25299791737143096
]).addTo(map)
.bindPopup("<b>Green Turtle Energy Stirling Court</b><br>Stirling Way");



L.marker([
51.6723187600829,
-0.269889949095273
]).addTo(map)
.bindPopup("<b>The Stables</b><br>Cowley Hill");



L.marker([
51.657236,
-0.270218
]).addTo(map)
.bindPopup("<b>Tesco Extra-Borehamwood</b><br>Shenley Road");



L.marker([
51.66058453,
-0.25915043
]).addTo(map)
.bindPopup("<b>Lidl-Borehamwood</b><br>Lupa House");



L.marker([
51.6583358860488,
-0.271209529121961
]).addTo(map)
.bindPopup("<b>McDonald's Borehamwood</b><br>213 Shenley Road");



</script>

</body>
</html>
