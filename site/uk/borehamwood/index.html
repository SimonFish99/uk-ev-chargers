<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Borehamwood EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Borehamwood EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Green Turtle Energy Stirling Court</strong><br>
Stirling Way
</li>

<li>
<strong>The Stables</strong><br>
Cowley Hill
</li>

<li>
<strong>Tesco Extra-Borehamwood</strong><br>
Shenley Road
</li>

<li>
<strong>Lidl-Borehamwood</strong><br>
Lupa House
</li>

<li>
<strong>McDonald's Borehamwood</strong><br>
213 Shenley Road
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
51.647055133387596,
-0.25299791737143096
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
51.647055133387596,
-0.25299791737143096
]);

marker.bindPopup(`
<b>Green Turtle Energy Stirling Court</b><br>
Stirling Way<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.647055133387596,-0.25299791737143096" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.6723187600829,
-0.269889949095273
]);

marker.bindPopup(`
<b>The Stables</b><br>
Cowley Hill<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.6723187600829,-0.269889949095273" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.657236,
-0.270218
]);

marker.bindPopup(`
<b>Tesco Extra-Borehamwood</b><br>
Shenley Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.657236,-0.270218" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.66058453,
-0.25915043
]);

marker.bindPopup(`
<b>Lidl-Borehamwood</b><br>
Lupa House<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.66058453,-0.25915043" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.6583358860488,
-0.271209529121961
]);

marker.bindPopup(`
<b>McDonald's Borehamwood</b><br>
213 Shenley Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.6583358860488,-0.271209529121961" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
