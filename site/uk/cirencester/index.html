<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cirencester EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Cirencester EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Dobbies Cirencester</strong><br>
Cirencester Road
</li>

<li>
<strong>Tesco Extra - Cirencester</strong><br>
Kings Meadow
</li>

<li>
<strong>Waitrose Cirencester</strong><br>
Hammond Way
</li>

<li>
<strong>Fuller Smith & Turner-the Swan Hotel Bibury</strong><br>
Bibury
</li>

<li>
<strong>Lidl Stores</strong><br>
Midland road
</li>

<li>
<strong>Beeches Car Park</strong><br>
Beeches Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.700291964507386,
-1.9399145767019945
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.700291964507386,
-1.9399145767019945
]).addTo(map)
.bindPopup("<b>Dobbies Cirencester</b><br>Cirencester Road");



L.marker([
51.705842,
-1.951557
]).addTo(map)
.bindPopup("<b>Tesco Extra - Cirencester</b><br>Kings Meadow");



L.marker([
51.71408469223556,
-1.971489633455576
]).addTo(map)
.bindPopup("<b>Waitrose Cirencester</b><br>Hammond Way");



L.marker([
51.760761,
-1.834996
]).addTo(map)
.bindPopup("<b>Fuller Smith & Turner-the Swan Hotel Bibury</b><br>Bibury");



L.marker([
51.7057072360618,
-1.95984373763099
]).addTo(map)
.bindPopup("<b>Lidl Stores</b><br>Midland road");



L.marker([
51.71660171380728,
-1.9604221306037743
]).addTo(map)
.bindPopup("<b>Beeches Car Park</b><br>Beeches Road");



</script>

</body>
</html>
