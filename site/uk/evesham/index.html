<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Evesham EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Evesham EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Lidl-Evesham</strong><br>
2 Broadway Road
</li>

<li>
<strong>Northwick Hotel</strong><br>
Waterside
</li>

<li>
<strong>Evesham Leisure Centre</strong><br>
Abbey Lane
</li>

<li>
<strong>Sinclair Retail Park</strong><br>
St Richards Road
</li>

<li>
<strong>Morrisons Evesham</strong><br>
Davies Rd
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
52.089576,
-1.935096
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
52.089576,
-1.935096
]);

marker.bindPopup(`
<b>Lidl-Evesham</b><br>
2 Broadway Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.089576,-1.935096" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.08996855765983,
-1.9420063025472016
]);

marker.bindPopup(`
<b>Northwick Hotel</b><br>
Waterside<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.08996855765983,-1.9420063025472016" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.08797347224325,
-1.9537541389541104
]);

marker.bindPopup(`
<b>Evesham Leisure Centre</b><br>
Abbey Lane<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.08797347224325,-1.9537541389541104" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.080519,
-1.9431299
]);

marker.bindPopup(`
<b>Sinclair Retail Park</b><br>
St Richards Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.080519,-1.9431299" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.07927874646316,
-1.9406738015641167
]);

marker.bindPopup(`
<b>Morrisons Evesham</b><br>
Davies Rd<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.07927874646316,-1.9406738015641167" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
