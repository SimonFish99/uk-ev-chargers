<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Braintree EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Braintree EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Tesco Superstore - Braintree Great Notley</strong><br>
1 The Square
</li>

<li>
<strong>Tesco Superstore-Braintree Town Centre</strong><br>
Market Place
</li>

<li>
<strong>Braintree Supercharger</strong><br>
Blackley Lane
</li>

<li>
<strong>Gridserve Electric Forecourt - Braintree</strong><br>
Edison Way 
</li>

<li>
<strong>George Yard Car Park</strong><br>
Pierrefitte Way
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.857605,
0.521807
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.857605,
0.521807
]).addTo(map)
.bindPopup("<b>Tesco Superstore - Braintree Great Notley</b><br>1 The Square");



L.marker([
51.877405,
0.552103
]).addTo(map)
.bindPopup("<b>Tesco Superstore-Braintree Town Centre</b><br>Market Place");



L.marker([
51.852568,
0.522422
]).addTo(map)
.bindPopup("<b>Braintree Supercharger</b><br>Blackley Lane");



L.marker([
51.8524064,
0.52128118
]).addTo(map)
.bindPopup("<b>Gridserve Electric Forecourt - Braintree</b><br>Edison Way ");



L.marker([
51.878417,
0.548924
]).addTo(map)
.bindPopup("<b>George Yard Car Park</b><br>Pierrefitte Way");



</script>

</body>
</html>
