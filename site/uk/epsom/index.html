<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Epsom EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Epsom EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Epsom Downs Racecourse </strong><br>
Tattenham Corner Road
</li>

<li>
<strong>Wilsons of Epsom Nissan</strong><br>
Kiln Lane, Surrey
</li>

<li>
<strong>Epsom Downs Racecourse</strong><br>
Epsom Lane North
</li>

<li>
<strong>EE Hook Road 1</strong><br>
Hook Road
</li>

<li>
<strong>Toyota Head Office</strong><br>
Burgh Heath
</li>

<li>
<strong>Toyota GB Head Office</strong><br>
3 Yew Tree Bottom Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.3136734941703,
-0.253776594967651
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.3136734941703,
-0.253776594967651
]).addTo(map)
.bindPopup("<b>Epsom Downs Racecourse </b><br>Tattenham Corner Road");



L.marker([
51.342556,
-0.260138
]).addTo(map)
.bindPopup("<b>Wilsons of Epsom Nissan</b><br>Kiln Lane, Surrey");



L.marker([
51.312599,
-0.25342
]).addTo(map)
.bindPopup("<b>Epsom Downs Racecourse</b><br>Epsom Lane North");



L.marker([
51.3357,
-0.2641
]).addTo(map)
.bindPopup("<b>EE Hook Road 1</b><br>Hook Road");



L.marker([
51.3134,
-0.231806
]).addTo(map)
.bindPopup("<b>Toyota Head Office</b><br>Burgh Heath");



L.marker([
51.315568,
-0.231359
]).addTo(map)
.bindPopup("<b>Toyota GB Head Office</b><br>3 Yew Tree Bottom Road");



</script>

</body>
</html>
