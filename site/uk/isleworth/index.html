<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Isleworth EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Isleworth EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Osterley Crescent</strong><br>
Osterley Crescent
</li>

<li>
<strong>Harvard Road</strong><br>
Harvard Road
</li>

<li>
<strong>Star Road</strong><br>
Star Road
</li>

<li>
<strong>Tesco Extra-Osterley</strong><br>
Grant Way
</li>

<li>
<strong>Tesco Extra-Twickenham</strong><br>
Mogden Lane
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.47934,
-0.337766
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.47934,
-0.337766
]).addTo(map)
.bindPopup("<b>Osterley Crescent</b><br>Osterley Crescent");



L.marker([
51.47716,
-0.3415
]).addTo(map)
.bindPopup("<b>Harvard Road</b><br>Harvard Road");



L.marker([
51.472644,
-0.348327
]).addTo(map)
.bindPopup("<b>Star Road</b><br>Star Road");



L.marker([
51.48527713,
-0.32983009
]).addTo(map)
.bindPopup("<b>Tesco Extra-Osterley</b><br>Grant Way");



L.marker([
51.458524,
-0.338132
]).addTo(map)
.bindPopup("<b>Tesco Extra-Twickenham</b><br>Mogden Lane");



</script>

</body>
</html>
