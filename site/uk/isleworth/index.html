<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Isleworth EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Isleworth EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Osterley Crescent</strong><br>
Osterley Crescent
</li>

<li>
<strong>Harvard Road</strong><br>
Harvard Road
</li>

<li>
<strong>Star Road</strong><br>
Star Road
</li>

<li>
<strong>Tesco Extra-Osterley</strong><br>
Grant Way
</li>

<li>
<strong>Tesco Extra-Twickenham</strong><br>
Mogden Lane
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
51.47934,
-0.337766
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
51.47934,
-0.337766
]);

marker.bindPopup(`
<b>Osterley Crescent</b><br>
Osterley Crescent<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.47934,-0.337766" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.47716,
-0.3415
]);

marker.bindPopup(`
<b>Harvard Road</b><br>
Harvard Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.47716,-0.3415" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.472644,
-0.348327
]);

marker.bindPopup(`
<b>Star Road</b><br>
Star Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.472644,-0.348327" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.48527713,
-0.32983009
]);

marker.bindPopup(`
<b>Tesco Extra-Osterley</b><br>
Grant Way<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.48527713,-0.32983009" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.458524,
-0.338132
]);

marker.bindPopup(`
<b>Tesco Extra-Twickenham</b><br>
Mogden Lane<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.458524,-0.338132" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
