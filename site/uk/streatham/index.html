<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Streatham EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

<body>

<script>

var map = L.map('map').setView([

], 12);
