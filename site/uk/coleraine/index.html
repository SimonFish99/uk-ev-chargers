<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coleraine EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Coleraine EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Lidl</strong><br>
Unit 17
</li>

<li>
<strong>Ulster University (Coleraine)</strong><br>
Portstewart Road
</li>

<li>
<strong>Roadside Garages</strong><br>
Somerset Road
</li>

<li>
<strong>Lodge Hotel</strong><br>
Lodge Park
</li>

<li>
<strong>HRL Millburn Road</strong><br>
Milburn Road
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
55.12119724212917,
-6.676560743258307
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
55.12119724212917,
-6.676560743258307
]);

marker.bindPopup(`
<b>Lidl</b><br>
Unit 17<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.12119724212917,-6.676560743258307" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.15103446041746,
-6.677225350702372
]);

marker.bindPopup(`
<b>Ulster University (Coleraine)</b><br>
Portstewart Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.15103446041746,-6.677225350702372" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.11664440969784,
-6.677802032438279
]);

marker.bindPopup(`
<b>Roadside Garages</b><br>
Somerset Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.11664440969784,-6.677802032438279" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.12564739289121,
-6.654807175013104
]);

marker.bindPopup(`
<b>Lodge Hotel</b><br>
Lodge Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.12564739289121,-6.654807175013104" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.139189935918836,
-6.665561210594717
]);

marker.bindPopup(`
<b>HRL Millburn Road</b><br>
Milburn Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.139189935918836,-6.665561210594717" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
