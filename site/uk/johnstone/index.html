<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Johnstone EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Johnstone EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Johnstone Town Hall</strong><br>
Craigdonald Place
</li>

<li>
<strong>McKillop Centre, Lochwinnoch</strong><br>
58 Main Street
</li>

<li>
<strong>Clyde Muirshiel Regional Park (3)</strong><br>
Calder Glen Road
</li>

<li>
<strong>Patons Mill, Johnstone</strong><br>
Patons Mill
</li>

<li>
<strong>Auchenncloich Road</strong><br>
Auchenncloich Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
55.83524,
-4.513222
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
55.83524,
-4.513222
]).addTo(map)
.bindPopup("<b>Johnstone Town Hall</b><br>Craigdonald Place");



L.marker([
55.793799,
-4.631981
]).addTo(map)
.bindPopup("<b>McKillop Centre, Lochwinnoch</b><br>58 Main Street");



L.marker([
55.832354,
-4.697751
]).addTo(map)
.bindPopup("<b>Clyde Muirshiel Regional Park (3)</b><br>Calder Glen Road");



L.marker([
55.83735,
-4.51802
]).addTo(map)
.bindPopup("<b>Patons Mill, Johnstone</b><br>Patons Mill");



L.marker([
55.841582,
-4.626057
]).addTo(map)
.bindPopup("<b>Auchenncloich Road</b><br>Auchenncloich Road");



</script>

</body>
</html>
