<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Johnstone EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Johnstone EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Johnstone Town Hall</strong><br>
Craigdonald Place
</li>

<li>
<strong>McKillop Centre, Lochwinnoch</strong><br>
58 Main Street
</li>

<li>
<strong>Clyde Muirshiel Regional Park (3)</strong><br>
Calder Glen Road
</li>

<li>
<strong>Patons Mill, Johnstone</strong><br>
Patons Mill
</li>

<li>
<strong>Auchenncloich Road</strong><br>
Auchenncloich Road
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
55.83524,
-4.513222
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
55.83524,
-4.513222
]);

marker.bindPopup(`
<b>Johnstone Town Hall</b><br>
Craigdonald Place<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.83524,-4.513222" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.793799,
-4.631981
]);

marker.bindPopup(`
<b>McKillop Centre, Lochwinnoch</b><br>
58 Main Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.793799,-4.631981" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.832354,
-4.697751
]);

marker.bindPopup(`
<b>Clyde Muirshiel Regional Park (3)</b><br>
Calder Glen Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.832354,-4.697751" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.83735,
-4.51802
]);

marker.bindPopup(`
<b>Patons Mill, Johnstone</b><br>
Patons Mill<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.83735,-4.51802" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
55.841582,
-4.626057
]);

marker.bindPopup(`
<b>Auchenncloich Road</b><br>
Auchenncloich Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=55.841582,-4.626057" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
