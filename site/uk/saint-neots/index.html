<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saint Neots EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Saint Neots EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Eaton Oak</strong><br>
Crosshall Road
</li>

<li>
<strong>St Neots - Tebbutts Road</strong><br>
Tebbutts Road
</li>

<li>
<strong>Riverside Car Park</strong><br>
The Paddock
</li>

<li>
<strong>Tan Yard Car Park</strong><br>
St Anselm Place
</li>

<li>
<strong>Tebbutts Road</strong><br>
Tebbutts Road
</li>

<li>
<strong>Brook Street Car Park</strong><br>
Brook Street
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
52.236446,
-0.283457
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
52.236446,
-0.283457
]);

marker.bindPopup(`
<b>Eaton Oak</b><br>
Crosshall Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.236446,-0.283457" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.229848,
0.266906
]);

marker.bindPopup(`
<b>St Neots - Tebbutts Road</b><br>
Tebbutts Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.229848,0.266906" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.2266422,
-0.2752074
]);

marker.bindPopup(`
<b>Riverside Car Park</b><br>
The Paddock<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.2266422,-0.2752074" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.2294162,
-0.2705601
]);

marker.bindPopup(`
<b>Tan Yard Car Park</b><br>
St Anselm Place<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.2294162,-0.2705601" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.229026910359,
-0.26666674157434
]);

marker.bindPopup(`
<b>Tebbutts Road</b><br>
Tebbutts Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.229026910359,-0.26666674157434" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
52.226847810423,
-0.268305954429024
]);

marker.bindPopup(`
<b>Brook Street Car Park</b><br>
Brook Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=52.226847810423,-0.268305954429024" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
