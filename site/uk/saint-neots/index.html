<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saint Neots EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Saint Neots EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Eaton Oak</strong><br>
Crosshall Road
</li>

<li>
<strong>St Neots - Tebbutts Road</strong><br>
Tebbutts Road
</li>

<li>
<strong>Riverside Car Park</strong><br>
The Paddock
</li>

<li>
<strong>Tan Yard Car Park</strong><br>
St Anselm Place
</li>

<li>
<strong>Tebbutts Road</strong><br>
Tebbutts Road
</li>

<li>
<strong>Brook Street Car Park</strong><br>
Brook Street
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
52.236446,
-0.283457
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
52.236446,
-0.283457
]).addTo(map)
.bindPopup("<b>Eaton Oak</b><br>Crosshall Road");



L.marker([
52.229848,
0.266906
]).addTo(map)
.bindPopup("<b>St Neots - Tebbutts Road</b><br>Tebbutts Road");



L.marker([
52.2266422,
-0.2752074
]).addTo(map)
.bindPopup("<b>Riverside Car Park</b><br>The Paddock");



L.marker([
52.2294162,
-0.2705601
]).addTo(map)
.bindPopup("<b>Tan Yard Car Park</b><br>St Anselm Place");



L.marker([
52.229026910359,
-0.26666674157434
]).addTo(map)
.bindPopup("<b>Tebbutts Road</b><br>Tebbutts Road");



L.marker([
52.226847810423,
-0.268305954429024
]).addTo(map)
.bindPopup("<b>Brook Street Car Park</b><br>Brook Street");



</script>

</body>
</html>
