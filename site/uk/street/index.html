<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Street EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Street EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Clarks International</strong><br>
40 High St
</li>

<li>
<strong>McDonald's Street</strong><br>
Gravenchon Way
</li>

<li>
<strong>High Street</strong><br>
High Street
</li>

<li>
<strong>Southside Car Park, Street 1</strong><br>
Southside Car Park, Street 1
</li>

<li>
<strong>Outlet Shopping Village</strong><br>
Outlet Shopping Village
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.12851884,
-2.73801329
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.12851884,
-2.73801329
]).addTo(map)
.bindPopup("<b>Clarks International</b><br>40 High St");



L.marker([
51.1256173534157,
-2.75451838852678
]).addTo(map)
.bindPopup("<b>McDonald's Street</b><br>Gravenchon Way");



L.marker([
51.12952907813812,
-2.7359690154322607
]).addTo(map)
.bindPopup("<b>High Street</b><br>High Street");



L.marker([
51.12546,
-2.740649
]).addTo(map)
.bindPopup("<b>Southside Car Park, Street 1</b><br>Southside Car Park, Street 1");



L.marker([
51.130008,
-2.740425
]).addTo(map)
.bindPopup("<b>Outlet Shopping Village</b><br>Outlet Shopping Village");



</script>

</body>
</html>
