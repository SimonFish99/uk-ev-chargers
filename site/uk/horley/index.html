<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Horley EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Horley EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Gatwick North Terminal</strong><br>
Longbridge Gate
</li>

<li>
<strong>EVC Stanhill Court Hotel</strong><br>
Stanhill Court Hotel
</li>

<li>
<strong>Purple Parking - Gatwick Airport</strong><br>
Q Park
</li>

<li>
<strong>Gridserve Electric Forecourt Gatwick</strong><br>
Marriott Courtyard Hotel
</li>

<li>
<strong>Victoria Rd Car Park, Horley</strong><br>
129-131 Victoria Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.160769,
-0.175357
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.160769,
-0.175357
]).addTo(map)
.bindPopup(`
<b>Gatwick North Terminal</b><br>
Longbridge Gate<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.160769,-0.175357" target="_blank">

</a>
`);

51.16673507712332,
-0.24118690191258824

</a>

51.1428042402538,
-0.210269953509842

Get directions
</a>

</script>

</html>
