<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Huddersfield EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Huddersfield EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>EVC Pennine Manor Hotel</strong><br>
Nettleton Hill Road
</li>

<li>
<strong>Asda Huddersfield</strong><br>
Asda Stores Ltd
</li>

<li>
<strong>Genie</strong><br>
St. Georges Square
</li>

<li>
<strong>Asda Aspley</strong><br>
5 Carr Pit Road
</li>

<li>
<strong>Bath Street Car Park</strong><br>
Bath Street
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
53.64792934,
-1.869682118
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
53.64792934,
-1.869682118
]);

marker.bindPopup(`
<b>EVC Pennine Manor Hotel</b><br>
Nettleton Hill Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.64792934,-1.869682118" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.674251,
-1.777329
]);

marker.bindPopup(`
<b>Asda Huddersfield</b><br>
Asda Stores Ltd<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.674251,-1.777329" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.648418,
-1.78454
]);

marker.bindPopup(`
<b>Genie</b><br>
St. Georges Square<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.648418,-1.78454" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.643749,
-1.771749
]);

marker.bindPopup(`
<b>Asda Aspley</b><br>
5 Carr Pit Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.643749,-1.771749" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.650955,
-1.784375
]);

marker.bindPopup(`
<b>Bath Street Car Park</b><br>
Bath Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.650955,-1.784375" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
