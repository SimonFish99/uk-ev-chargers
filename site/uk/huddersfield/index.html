<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Huddersfield EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Huddersfield EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>EVC Pennine Manor Hotel</strong><br>
Nettleton Hill Road
</li>

<li>
<strong>Asda Huddersfield</strong><br>
Asda Stores Ltd
</li>

<li>
<strong>Genie</strong><br>
St. Georges Square
</li>

<li>
<strong>Asda Aspley</strong><br>
5 Carr Pit Road
</li>

<li>
<strong>Bath Street Car Park</strong><br>
Bath Street
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
53.64792934,
-1.869682118
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
53.64792934,
-1.869682118
]).addTo(map)
.bindPopup("<b>EVC Pennine Manor Hotel</b><br>Nettleton Hill Road");



L.marker([
53.674251,
-1.777329
]).addTo(map)
.bindPopup("<b>Asda Huddersfield</b><br>Asda Stores Ltd");



L.marker([
53.648418,
-1.78454
]).addTo(map)
.bindPopup("<b>Genie</b><br>St. Georges Square");



L.marker([
53.643749,
-1.771749
]).addTo(map)
.bindPopup("<b>Asda Aspley</b><br>5 Carr Pit Road");



L.marker([
53.650955,
-1.784375
]).addTo(map)
.bindPopup("<b>Bath Street Car Park</b><br>Bath Street");



</script>

</body>
</html>
