<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chipping Norton EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Chipping Norton EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>ALDI Chipping Norton</strong><br>
Banbury Road
</li>

<li>
<strong>SHELL RECHARGE LITTLE WAITROSE HOLYWELL</strong><br>
Chapel Cross Roads
</li>

<li>
<strong>Willow Gardens</strong><br>
Russell Way
</li>

<li>
<strong>New Street Carpark</strong><br>
New Street
</li>

<li>
<strong>Owen Mumford Ltd</strong><br>
Primsdown Industrial Estate
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
51.945835366185435,
-1.5379239015763915
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
51.945835366185435,
-1.5379239015763915
]).addTo(map)
.bindPopup("<b>ALDI Chipping Norton</b><br>Banbury Road");



L.marker([
51.95121,
-1.525395
]).addTo(map)
.bindPopup("<b>SHELL RECHARGE LITTLE WAITROSE HOLYWELL</b><br>Chapel Cross Roads");



L.marker([
51.944583,
-1.535028
]).addTo(map)
.bindPopup("<b>Willow Gardens</b><br>Russell Way");



L.marker([
51.940587588458584,
-1.547606191109253
]).addTo(map)
.bindPopup("<b>New Street Carpark</b><br>New Street");



L.marker([
51.941444,
-1.558101
]).addTo(map)
.bindPopup("<b>Owen Mumford Ltd</b><br>Primsdown Industrial Estate");



</script>

</body>
</html>
