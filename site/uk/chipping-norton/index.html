<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chipping Norton EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Chipping Norton EV Chargers</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
51.945835366185435,
-1.5379239015763915
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
51.945835366185435,
-1.5379239015763915
]);

marker.bindPopup(`
<b>ALDI Chipping Norton</b><br>
Banbury Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=51.945835366185435,-1.5379239015763915" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
51.95121,
-1.525395
]);

marker.bindPopup(`
<b>SHELL RECHARGE LITTLE WAITROSE HOLYWELL</b><br>

<a href="https://www.google.com/maps/dir/?api=1&destination=51.95121,-1.525395" target="_blank">

</a>
`);

markers.addLayer(marker);

51.944583,
-1.535028
]);

</a>

var marker = L.marker([
51.940587588458584,
-1.547606191109253

marker.bindPopup(`

map.addLayer(markers);
