<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retford EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Retford EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Morrisons</strong><br>
Idle Valley Road
</li>

<li>
<strong>EG GROUP RETFORD</strong><br>
King Edward Services. EURO GARAGES
</li>

<li>
<strong>Starbucks Markham Moor</strong><br>
A1 Southbound
</li>

<li>
<strong>Markham Moor Inn</strong><br>
Great North Road
</li>

<li>
<strong>Randall Business Centre</strong><br>
Randall Park Way
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
53.326561,
-0.942165
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
53.326561,
-0.942165
]);

marker.bindPopup(`
<b>Morrisons</b><br>
Idle Valley Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.326561,-0.942165" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.317483,
-0.938523
]);

marker.bindPopup(`
<b>EG GROUP RETFORD</b><br>
King Edward Services. EURO GARAGES<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.317483,-0.938523" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.2570124746955,
-0.927866690861833
]);

marker.bindPopup(`
<b>Starbucks Markham Moor</b><br>
A1 Southbound<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.2570124746955,-0.927866690861833" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.2577789579793,
-0.925787328900583
]);

marker.bindPopup(`
<b>Markham Moor Inn</b><br>
Great North Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.2577789579793,-0.925787328900583" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.3358,
-0.959832
]);

marker.bindPopup(`
<b>Randall Business Centre</b><br>
Randall Park Way<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.3358,-0.959832" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
