<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retford EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Retford EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Morrisons</strong><br>
Idle Valley Road
</li>

<li>
<strong>EG GROUP RETFORD</strong><br>
King Edward Services. EURO GARAGES
</li>

<li>
<strong>Starbucks Markham Moor</strong><br>
A1 Southbound
</li>

<li>
<strong>Markham Moor Inn</strong><br>
Great North Road
</li>

<li>
<strong>Randall Business Centre</strong><br>
Randall Park Way
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
53.326561,
-0.942165
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
53.326561,
-0.942165
]).addTo(map)
.bindPopup("<b>Morrisons</b><br>Idle Valley Road");



L.marker([
53.317483,
-0.938523
]).addTo(map)
.bindPopup("<b>EG GROUP RETFORD</b><br>King Edward Services. EURO GARAGES");



L.marker([
53.2570124746955,
-0.927866690861833
]).addTo(map)
.bindPopup("<b>Starbucks Markham Moor</b><br>A1 Southbound");



L.marker([
53.2577789579793,
-0.925787328900583
]).addTo(map)
.bindPopup("<b>Markham Moor Inn</b><br>Great North Road");



L.marker([
53.3358,
-0.959832
]).addTo(map)
.bindPopup("<b>Randall Business Centre</b><br>Randall Park Way");



</script>

</body>
</html>
