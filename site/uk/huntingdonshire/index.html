<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Huntingdonshire EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Huntingdonshire EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Evology Charging - Dolphin hotel</strong><br>
London Road
</li>

<li>
<strong>St Ives Park and Ride</strong><br>
St. Ives
</li>

<li>
<strong>Tesco Extra-Huntingdon</strong><br>
Abbots Ripton Road
</li>

<li>
<strong>Ionity Peterborough</strong><br>
ExtraMSA Peterborough Services
</li>

<li>
<strong>Cattle Market Car Park</strong><br>
Market street
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
52.3225402622769,
-0.07618914171314373
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
52.3225402622769,
-0.07618914171314373
]).addTo(map)
.bindPopup("<b>Evology Charging - Dolphin hotel</b><br>London Road");



L.marker([
52.321953,
-0.064465
]).addTo(map)
.bindPopup("<b>St Ives Park and Ride</b><br>St. Ives");



L.marker([
52.352803,
-0.181039
]).addTo(map)
.bindPopup("<b>Tesco Extra-Huntingdon</b><br>Abbots Ripton Road");



L.marker([
52.532663,
-0.32065
]).addTo(map)
.bindPopup("<b>Ionity Peterborough</b><br>ExtraMSA Peterborough Services");



L.marker([
52.323144721855,
-0.069888423273369
]).addTo(map)
.bindPopup("<b>Cattle Market Car Park</b><br>Market street");



</script>

</body>
</html>
