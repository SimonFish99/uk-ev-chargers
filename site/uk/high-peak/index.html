<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>High Peak EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>High Peak EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Furnessvale Marina</strong><br>
Furness Vale
</li>

<li>
<strong>Tesco Superstore-High Peak Whaley Bridge</strong><br>
Bridgemont
</li>

<li>
<strong>Sylvan Car Park </strong><br>
Sylvan Park
</li>

<li>
<strong>Morrisons Chapel En Le Frith</strong><br>
Market Street
</li>

<li>
<strong>Cracken' View Studio, The Old Hall Inn</strong><br>
Whitehough
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
53.349835,
-1.989944
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
53.349835,
-1.989944
]);

marker.bindPopup(`
<b>Furnessvale Marina</b><br>
Furness Vale<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.349835,-1.989944" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.33632,
-1.982152
]);

marker.bindPopup(`
<b>Tesco Superstore-High Peak Whaley Bridge</b><br>
Bridgemont<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.33632,-1.982152" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.2591299030581,
-1.90792881808306
]);

marker.bindPopup(`
<b>Sylvan Car Park </b><br>
Sylvan Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.2591299030581,-1.90792881808306" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.325186,
-1.911742
]);

marker.bindPopup(`
<b>Morrisons Chapel En Le Frith</b><br>
Market Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.325186,-1.911742" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.33553730691074,
-1.9439410875454541
]);

marker.bindPopup(`
<b>Cracken' View Studio, The Old Hall Inn</b><br>
Whitehough<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.33553730691074,-1.9439410875454541" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
