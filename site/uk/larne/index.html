<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Larne EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Larne EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Circular Road West Car Park</strong><br>
Circular Rd
</li>

<li>
<strong>Curran Court Hotel</strong><br>
6 Redlands Road
</li>

<li>
<strong>Linn Road Service Station</strong><br>
16 Linn Road
</li>

<li>
<strong>HRL Kilwaughter</strong><br>
44 Belfast Road
</li>

<li>
<strong>Narrow Gauge</strong><br>
Circular Road
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
54.849495098269415,
-5.81761193636666
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
54.849495098269415,
-5.81761193636666
]).addTo(map)
.bindPopup("<b>Circular Road West Car Park</b><br>Circular Rd");



L.marker([
54.84572274826334,
-5.808342725044753
]).addTo(map)
.bindPopup("<b>Curran Court Hotel</b><br>6 Redlands Road");



L.marker([
54.850706103127436,
-5.840601686824584
]).addTo(map)
.bindPopup("<b>Linn Road Service Station</b><br>16 Linn Road");



L.marker([
54.83476557361965,
-5.867127775523414
]).addTo(map)
.bindPopup("<b>HRL Kilwaughter</b><br>44 Belfast Road");



L.marker([
54.85035,
-5.82056
]).addTo(map)
.bindPopup("<b>Narrow Gauge</b><br>Circular Road");



</script>

</body>
</html>
