<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dewsbury EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Dewsbury EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Lidl-Dewsbury</strong><br>
Commercial Road
</li>

<li>
<strong>Morrisons</strong><br>
Dewsbury Road
</li>

<li>
<strong>EVC Rishworth Centre</strong><br>
Railway Street
</li>

<li>
<strong>Dewsbury Railway Station</strong><br>
Wellington Road
</li>

<li>
<strong>South Street</strong><br>
South Street
</li>

<li>
<strong>Ravensthorpe Retail Park</strong><br>
Huddersfield Rd
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
53.694972,
-1.631997
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
53.694972,
-1.631997
]);

marker.bindPopup(`
<b>Lidl-Dewsbury</b><br>
Commercial Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.694972,-1.631997" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.678371,
-1.525453
]);

marker.bindPopup(`
<b>Morrisons</b><br>
Dewsbury Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.678371,-1.525453" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.69043326,
-1.624600589
]);

marker.bindPopup(`
<b>EVC Rishworth Centre</b><br>
Railway Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.69043326,-1.624600589" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.692112,
-1.632379
]);

marker.bindPopup(`
<b>Dewsbury Railway Station</b><br>
Wellington Road<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.692112,-1.632379" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.690243,
-1.632613
]);

marker.bindPopup(`
<b>South Street</b><br>
South Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.690243,-1.632613" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.680535,
-1.662613
]);

marker.bindPopup(`
<b>Ravensthorpe Retail Park</b><br>
Huddersfield Rd<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.680535,-1.662613" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
