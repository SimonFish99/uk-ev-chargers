<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rossendale EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 400px;
  margin-bottom: 30px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>Rossendale EV Chargers</h1>

<div id="map"></div>

<ul>

<li>
<strong>Rossendale - Hindle St CP</strong><br>
Rossendale - Hindle St CP
</li>

<li>
<strong>Rossendale - Daisy Hill CP</strong><br>
Daisy Hill Car Park
</li>

<li>
<strong>Tesco Superstore - Rossendale Haslingden</strong><br>
Syke Street
</li>

<li>
<strong>Kay Street</strong><br>
Kay Street
</li>

<li>
<strong>Kay Street</strong><br>
Kay Street
</li>

</ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([
53.705626,
-2.324608
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



L.marker([
53.705626,
-2.324608
]).addTo(map)
.bindPopup("<b>Rossendale - Hindle St CP</b><br>Rossendale - Hindle St CP");



L.marker([
53.703467,
-2.284206
]).addTo(map)
.bindPopup("<b>Rossendale - Daisy Hill CP</b><br>Daisy Hill Car Park");



L.marker([
53.694471,
-2.316419
]).addTo(map)
.bindPopup("<b>Tesco Superstore - Rossendale Haslingden</b><br>Syke Street");



L.marker([
53.701855,
-2.284547
]).addTo(map)
.bindPopup("<b>Kay Street</b><br>Kay Street");



L.marker([
53.701664,
-2.284336
]).addTo(map)
.bindPopup("<b>Kay Street</b><br>Kay Street");



</script>

</body>
</html>
