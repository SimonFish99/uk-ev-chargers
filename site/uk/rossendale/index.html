<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rossendale EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>Rossendale EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>

<li>
<strong>Rossendale - Hindle St CP</strong><br>
Rossendale - Hindle St CP
</li>

<li>
<strong>Rossendale - Daisy Hill CP</strong><br>
Daisy Hill Car Park
</li>

<li>
<strong>Tesco Superstore - Rossendale Haslingden</strong><br>
Syke Street
</li>

<li>
<strong>Kay Street</strong><br>
Kay Street
</li>

<li>
<strong>Kay Street</strong><br>
Kay Street
</li>

</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
53.705626,
-2.324608
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();



var marker = L.marker([
53.705626,
-2.324608
]);

marker.bindPopup(`
<b>Rossendale - Hindle St CP</b><br>
Rossendale - Hindle St CP<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.705626,-2.324608" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.703467,
-2.284206
]);

marker.bindPopup(`
<b>Rossendale - Daisy Hill CP</b><br>
Daisy Hill Car Park<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.703467,-2.284206" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.694471,
-2.316419
]);

marker.bindPopup(`
<b>Tesco Superstore - Rossendale Haslingden</b><br>
Syke Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.694471,-2.316419" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.701855,
-2.284547
]);

marker.bindPopup(`
<b>Kay Street</b><br>
Kay Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.701855,-2.284547" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



var marker = L.marker([
53.701664,
-2.284336
]);

marker.bindPopup(`
<b>Kay Street</b><br>
Kay Street<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=53.701664,-2.284336" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);



map.addLayer(markers);

</script>

</body>
</html>
