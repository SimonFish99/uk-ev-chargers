<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ town }} EV Chargers</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background: #1f2937;
  padding: 12px 20px;
}

.logo {
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

#map {
  height: 420px;
  margin-bottom: 30px;
  border-radius: 8px;
}

</style>

</head>

<body>

<header>
<a href="/" class="logo">PlugMap</a>
</header>

<div class="container">

<h1>{{ town }} EV Chargers</h1>

<a href="/" class="back-link">← Back to homepage</a>

<div id="map"></div>

<ul>
{% for charger in chargers %}
<li>
<strong>{{ charger.AddressInfo.Title }}</strong><br>
{{ charger.AddressInfo.AddressLine1 }}
</li>
{% endfor %}
</ul>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([
{{ chargers[0].AddressInfo.Latitude }},
{{ chargers[0].AddressInfo.Longitude }}
], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = L.markerClusterGroup();

{% for charger in chargers %}

var marker = L.marker([
{{ charger.AddressInfo.Latitude }},
{{ charger.AddressInfo.Longitude }}
]);

marker.bindPopup(`
<b>{{ charger.AddressInfo.Title }}</b><br>
{{ charger.AddressInfo.AddressLine1 }}<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination={{ charger.AddressInfo.Latitude }},{{ charger.AddressInfo.Longitude }}" target="_blank">
Get directions
</a>
`);

markers.addLayer(marker);

{% endfor %}

map.addLayer(markers);

</script>

</body>
</html>
