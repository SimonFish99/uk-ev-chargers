<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EV Chargers in {{ town }}</title>
</head>

<body>

<h1>EV Chargers in {{ town }}</h1>

<p>Total charging locations: {{ chargers|length }}</p>

<ul>
{% for charger in chargers %}
    <li>
        <strong>{{ charger.AddressInfo.Title }}</strong><br>
        {{ charger.AddressInfo.AddressLine1 }}<br>
        {{ charger.AddressInfo.Town }}<br>
        {{ charger.AddressInfo.Postcode }}
    </li>
{% endfor %}
</ul>

</body>
</html>
