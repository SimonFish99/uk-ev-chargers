<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EV Chargers in {{ town }}</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<header>
<h1>EV Chargers in {{ town }}</h1>
</header>

<div class="container">

<p>{{ chargers|length }} charging locations found.</p>

{% for charger in chargers %}
<div class="card">

<h3>{{ charger.AddressInfo.Title }}</h3>

<p>
{{ charger.AddressInfo.AddressLine1 }}<br>
{{ charger.AddressInfo.Town }}<br>
{{ charger.AddressInfo.Postcode }}
</p>

</div>
{% endfor %}

</div>

<footer>
EV Charger Directory
</footer>

</body>
</html>
