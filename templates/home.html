<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UK EV Charger Locations</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<header>
<a href="/" class="logo">
  PlugMap <span class="tagline">UK EV Charger Locator</span>
</a>
</header>

<div class="container">

<p>Browse towns with public EV charging stations.</p>

<ul>
{% for town in towns %}
<li>
<a href="/uk/{{ town.slug }}/">{{ town.name }}</a>
</li>
{% endfor %}
</ul>

</div>

<footer>
EV Charger Directory
</footer>

</body>
</html>
